}

// ── ESEGUI CORSA ──
function fEseguiCorsa(scelta){
  const fase=F._fasePalio;
  const giri=fase==='finale'?5:4;
  const bP=F._fbP;const bIA=F._fbIA;
  const cav=F.cavScelta||F.stallaContrada[0]||F.stallaPersonale[0];

  // Applica effetti strategia
  if(scelta==='vendi'){
    Object.keys(F.rivali).forEach(n=>F.rivali[n].amicizia=clamp(F.rivali[n].amicizia+10,0,100));
    Object.keys(F.intesaCapitani).forEach(k=>{if(k!==F.contrada)F.intesaCapitani[k]=clamp(F.intesaCapitani[k]+15,0,100);});
    F.intesa=clamp(F.intesa-25,0,100);F.sostegno=clamp(F.sostegno-50,0,100);
    fAddLog('Venduto! Intesa capitano −25, sostegno −50','red');
    // forza arrivo ultimo: mult quasi 0
    Mos.mult=0.05;
  } else {
    Object.keys(F.rivali).forEach(n=>F.rivali[n].amicizia=clamp(F.rivali[n].amicizia-5,0,100));
    Object.keys(F.intesaCapitani).forEach(k=>{if(k!==F.contrada)F.intesaCapitani[k]=clamp(F.intesaCapitani[k]-10,0,100);});
    F.intesa=clamp(F.intesa+10,0,100);F.sostegno=clamp(F.sostegno+15,0,100);
    cav.vel=clamp(cav.vel+1,1,5);
    fAddLog('Gareggiato alla morte! +1 Vel cavallo, intesa +10, sostegno +15','grn');
  }
  fSyncEmpatia();fSalva();

  // Simula corsa
  const partecipanti=fase==='batteria'?bP:[...(F._fbQP||[]),...(F._fbQIA||[])];
  const sc={};partecipanti.forEach(n=>sc[n]=0);const gpg=[];
  for(let g=1;g<=giri;g++){
    partecipanti.forEach(n=>{
      const isP=n===F.contrada;
      const c2=isP?cav:newIACav();const f2=isP?{bravura:F.bravura,esp:F.esperienza,mossa:F.mossa,emp:F.empatia}:newIAFan();
      const pen=isP&&c2._meteoPen?c2._meteoPen:{ten:0,res:0};
      const resEff=Math.max(1,c2.res-(pen.res||0));
      const tenEff=Math.max(1,c2.ten-(pen.ten||0));
      const fatica=Math.max(0,(g-1)*(6-resEff)*.2);
      // Applica effetti intesa fantino (bonus ten e ner)
      if(isP){const st=fStatCorsaEffettiva(c2);c2._bonTen=st.ten-c2.ten;c2._bonNer=st.ner-c2.ner;}
      const bonTen=isP?(c2._bonTen||0):0;
      const base=(c2.vel+c2.acc+tenEff+bonTen)-fatica+(f2.bravura*.5+(f2.emp||f2.empatia||1)*.2);
      sc[n]+=base*((g===1&&isP)?Mos.mult:1)+rf(0,3);
    });
    gpg.push([...Object.entries(sc)].sort((a,b)=>b[1]-a[1]).map(x=>x[0]));
  }
  const classFinale=gpg[gpg.length-1];
  const pos=classFinale.indexOf(F.contrada)+1;
  const qP=classFinale.slice(0,2);

  if(fase==='batteria'){
    F._fbQP=qP;
    const gpgIA=[];const scIA={};F._fbIA.forEach(n=>scIA[n]=0);
    for(let g=1;g<=4;g++){F._fbIA.forEach(n=>{scIA[n]+=(rnd(2,5)+rnd(2,5)+rnd(1,5))+rf(0,3);});gpgIA.push([...Object.entries(scIA)].sort((a,b)=>b[1]-a[1]).map(x=>x[0]));}
    F._fbQIA=gpgIA[gpgIA.length-1].slice(0,2);
  }

  const playerIn=fase==='finale'?true:qP.includes(F.contrada);
  const vinto=fase==='finale'&&pos===1;

  if(vinto){
    F.bravura=clamp(F.bravura-1,1,5);F.esperienza=clamp(F.esperienza+1,1,5);
    F.intesa=clamp(F.intesa+50,0,100);F.sostegno=clamp(F.sostegno+50,0,100);
    F.premi=F.premi||[];F.premi.push({anno:F.anno,contrada:F.contrada});
    F.oro+=500;
    fAddLog('🏆 HAI VINTO IL PALIO '+F.anno+'! +500 oro, +1 Esp, +50 intesa, +50 sostegno','grn');
  } else if(fase==='finale'){
    F.bravura=clamp(F.bravura-1,1,5);F.esperienza=clamp(F.esperienza-1,1,5);
    fAddLog('Palio '+F.anno+': perso. −1 Bravura, −1 Esperienza','red');
  }
  if(F.cavScelta)ripristinaMeteo(F.cavScelta);
  fSyncEmpatia();fSalva();

  let html=`<div style="text-align:center;margin-bottom:12px">
    <div style="font-size:28px">${vinto?'🏆':fase==='finale'?'😔':'🏇'}</div>
    <div style="font-family:var(--fn);font-size:17px;font-weight:700;color:${vinto?'var(--gold)':'var(--parch)'};margin-top:4px">
      ${vinto?'HAI VINTO IL PALIO!':fase==='finale'?'Finalissima — '+pos+'° posto':'Batteria — '+pos+'° posto'}
    </div></div>
  <div class="card">`;
  for(let g=0;g<gpg.length;g++){
    html+=`<div style="margin-bottom:7px"><div style="font-size:9px;color:var(--gold);text-transform:uppercase;letter-spacing:2px;margin-bottom:3px">Giro ${g+1}</div>`;
    gpg[g].forEach((nome,p)=>{html+=`<div class="cr-line ${nome===F.contrada?'pp':'def'}">${p+1}° ${nome}</div>`;});
    html+=`</div>`;
  }
  html+=`</div>`;

  if(fase==='batteria'){
    const finInBatt=qP.includes(F.contrada);
    html+=`<div class="card" style="text-align:center">
      <div style="font-family:var(--fn);font-size:14px;font-weight:700;color:${finInBatt?'#5DBB63':'var(--gold)'};margin-bottom:8px">${finInBatt?'⚜ Sei qualificato alla finale!':'Non sei qualificato. Guardi dalle tribune.'}</div>
      <div style="font-size:12px;color:rgba(201,168,76,.5);margin-bottom:10px">Finalisti batteria A: ${qP.join(', ')} · Batteria B: ${F._fbQIA.join(', ')}</div>
      <button class="btn gold w" onclick="${finInBatt?'fShowMossaFantino(\'finale\')':'fFinaleSpettatore()'}">${finInBatt?'⚔ Prepara la finale! →':'👀 Guarda la finale →'}</button>
    </div>`;
  } else {
    html+=`<button class="btn gold w" onclick="fShowFineAnno(${vinto?1:0})">Fine anno →</button>`;
  }
  setMain('<div class="pad">'+html+'</div>');
}

function fFinaleSpettatore(){
  const finalisti=[...(F._fbQP||[]),...(F._fbQIA||[])];
  F._fasePalio='finale';Mos.mult=1;
  fEseguiCorsaSpettatore(finalisti);
}
function fEseguiCorsaSpettatore(finalisti){
  const sc={};finalisti.forEach(n=>sc[n]=0);const gpg=[];
  for(let g=1;g<=5;g++){finalisti.forEach(n=>{sc[n]+=(rnd(2,5)+rnd(2,5))+rf(0,3);});gpg.push([...Object.entries(sc)].sort((a,b)=>b[1]-a[1]).map(x=>x[0]));}
  const vincitore=gpg[gpg.length-1][0];
  fAddLog('Finale: vince '+vincitore,'inf');fSalva();
  let html=`<div style="text-align:center;margin-bottom:12px"><div style="font-size:28px">👀</div>
    <div style="font-family:var(--fn);font-size:17px;font-weight:700;color:var(--gold);margin-top:4px">Finalissima — Stai guardando dalle tribune</div></div>
  <div class="card">`;
  for(let g=0;g<gpg.length;g++){html+=`<div style="margin-bottom:7px"><div style="font-size:9px;color:var(--gold);text-transform:uppercase;letter-spacing:2px;margin-bottom:3px">Giro ${g+1}/5</div>`;gpg[g].forEach((nome,p)=>{html+=`<div class="cr-line def">${p+1}° ${nome}${p===0&&g===gpg.length-1?' 🏆':''}</div>`;});html+=`</div>`;}
  html+=`</div><button class="btn gold w" onclick="fShowFineAnno(0)">Fine anno →</button>`;
  setMain('<div class="pad">'+html+'</div>');
}

// ── FINE ANNO FANTINO ──
function fShowFineAnno(vinto){
  F._vinto=vinto;
  const puoRestare=F.intesa>=40;
  const contradeCambiabili=Object.keys(CDB).filter(k=>k!==F.contrada&&(F.intesaCapitani[k]||0)>=60);
  setMain(`<div class="pad">
    <div style="text-align:center;margin-bottom:16px">
      <div style="font-size:30px">⚜</div>
      <div style="font-family:var(--fn);font-size:17px;font-weight:700;color:var(--gold);margin-top:8px">Fine Anno ${F.anno}</div>
    </div>
    <div class="card">
      ${fBar('Intesa col Capitano',F.intesa,'fnt-bar-green')}
      ${fBar('Sostegno contradaioli',F.sostegno,'fnt-bar-blue')}
    </div>
    <div class="card">
      ${puoRestare?`<button class="btn gold w" onclick="fNuovoAnno(false)" style="margin-bottom:8px">Rimani con ${F.contrada}</button>`
        :`<div class="evbox red" style="margin-bottom:8px">Intesa troppo bassa per restare (serve ≥40). Devi cambiare contrada.</div>`}
      ${contradeCambiabili.length?`<div style="font-size:12px;color:rgba(201,168,76,.5);margin-bottom:8px">Contrade disponibili (intesa ≥60):</div>
        ${contradeCambiabili.map(k=>`<button class="btn w" onclick="fNuovoAnno(true,'${k}')" style="margin-bottom:6px;text-align:left;padding:11px">
          Vai con ${k} <span style="font-size:11px;color:rgba(201,168,76,.5);margin-left:6px">Intesa: ${F.intesaCapitani[k]}/100</span>
        </button>`).join('')}`
        :`<div style="font-size:12px;color:rgba(201,168,76,.4)">Nessuna contrada disponibile al cambio (intesa <60).</div>`}
    </div>
  </div>`);
}

function fNuovoAnno(cambia,nuovaContrada){
  // Stalla contrada sempre azzerata a fine anno
  F.stallaContrada=[];
  if(cambia&&nuovaContrada){
    F.contrada=nuovaContrada;
    F.nemica=CDB[nuovaContrada].nemica;
    F.intesa=F.intesaCapitani[nuovaContrada]||60;
    fAddLog('Nuovo anno con '+nuovaContrada,'inf');
    // Riassegna rivali escludendo la nuova contrada del giocatore
    fRiassegnaRivali();
  } else {
    // Anche restando, riassegna casualmente i rivali (escludi la propria contrada)
    fRiassegnaRivali();
  }
  F.mi=0;F.anno++;
  F.veterinario=false;F._stipendioAumentato=false;
  F.corsaUsata=false;F.addestramentoContrataUsato=false;F.amiciziaMensile=0;
  F.cavScelta=null;F._fbP=null;F._fbIA=null;F._fbQP=null;F._fbQIA=null;
  F.mktF=fGenMkt();
  // Invecchiamento cavalli personali: solo dal 3° anno in stalla
  F.stallaPersonale.forEach(c=>{
    const anni=(F.anno+1)-(c.annoAcquisto||F.anno+1);
    if(anni>=3){
      c.maxAcc=Math.max(1,c.maxAcc-1);c.maxRes=Math.max(1,c.maxRes-1);
      c.acc=Math.min(c.acc,c.maxAcc);c.res=Math.min(c.res,c.maxRes);
    }
  });
  // Nemica fantini: −25 amicizia
  Object.entries(F.rivali).forEach(([n,info])=>{if(info.contrada===F.nemica)F.rivali[n].amicizia=clamp(info.amicizia-25,0,100);});
  fSyncEmpatia();fSalva();
  fAvviaUI();
}

function fRiassegnaRivali(){
  const altreContrade=Object.keys(CDB).filter(k=>k!==F.contrada);
  // assegna esattamente 7 fantini alle 7 contrade, 1 per contrada
  const shuffled=[...altreContrade].sort(()=>Math.random()-.5);
  const nomiRivali=Object.keys(F.rivali);
  const shuffledNomi=[...nomiRivali].sort(()=>Math.random()-.5);
  shuffledNomi.forEach((nome,i)=>{
    F.rivali[nome].contrada=i<shuffled.length?shuffled[i]:null;
  });
}
