<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Palio di Legnano">
<link rel="apple-touch-icon" href="icon.png">
<meta name="theme-color" content="#1A0E08">
<title>Palio di Legnano</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
:root{
  --gold:#C9A84C;--gold-l:#E8D5A3;--gold-d:#8B6914;
  --parch:#F5EDD6;--parch2:#E8D5A3;
  --bg:#1A0E08;--bg2:#261508;
  --red:#8B1A1A;--red2:#5C0000;
  --bord:1px solid rgba(201,168,76,0.27);
  --bord2:1px solid rgba(201,168,76,0.53);
  --st:env(safe-area-inset-top,0px);
  --sb:env(safe-area-inset-bottom,0px);
  --sl:env(safe-area-inset-left,0px);
  --sr:env(safe-area-inset-right,0px);
  /* iOS system fonts — no external deps */
  --fs:ui-serif,-apple-system-ui-serif,"Georgia",serif;
  --fd:"Georgia","Times New Roman",serif;
  --fn:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",sans-serif;
}
html,body{height:100%;overflow:hidden;background:#0D0806;overscroll-behavior:none}
body{font-family:var(--fs)}

.app{position:fixed;top:0;left:0;right:0;bottom:0;
  padding-top:var(--st);padding-bottom:var(--sb);
  padding-left:var(--sl);padding-right:var(--sr);
  background:var(--bg);color:var(--parch);
  display:flex;flex-direction:column;overflow:hidden}
.app::before{content:"";position:absolute;inset:0;pointer-events:none;z-index:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 30px,rgba(201,168,76,.04) 30px,rgba(201,168,76,.04) 31px),
             repeating-linear-gradient(90deg,transparent,transparent 30px,rgba(201,168,76,.04) 30px,rgba(201,168,76,.04) 31px)}

/* HEADER */
.hdr{background:linear-gradient(135deg,#3D0000,#8B1A1A 50%,#3D0000);
  border-bottom:2px solid var(--gold);
  padding:12px 16px;display:flex;align-items:center;justify-content:space-between;
  position:relative;z-index:10;flex-shrink:0}
.hdr::after{content:"✦";position:absolute;left:50%;transform:translateX(-50%);
  color:var(--gold);font-size:13px;opacity:.6}
.hsub{font-size:10px;color:var(--gold-l);letter-spacing:2px;text-transform:uppercase;
  font-family:var(--fn)}
.htit{font-family:var(--fn);font-size:17px;font-weight:700;color:var(--gold);letter-spacing:.5px}
.hmese{font-family:var(--fn);font-size:11px;color:var(--gold-l);text-align:right}

/* HUD */
.hud{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;
  padding:7px 10px;background:var(--bg2);
  border-bottom:var(--bord);position:relative;z-index:9;flex-shrink:0}
.hc{background:var(--bg2);border:var(--bord);border-radius:7px;padding:5px 7px;overflow:hidden;position:relative}
.hc::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.hl{font-size:9px;color:var(--gold-l);letter-spacing:1px;text-transform:uppercase;
  font-family:var(--fn);margin-bottom:1px}
.hv{font-size:12px;font-weight:700;color:var(--parch);white-space:nowrap;overflow:hidden;
  text-overflow:ellipsis;font-family:var(--fn)}
.hv.o{color:var(--gold)}.hv.v{color:#5DBB63}

/* MAIN */
.main{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;
  position:relative;z-index:1}
.main::-webkit-scrollbar{display:none}
.pad{padding:12px 12px 24px}

/* BOTTOM NAV */
.nav{display:flex;border-top:var(--bord);background:var(--bg2);
  position:relative;z-index:10;flex-shrink:0}
.nb{flex:1;padding:8px 2px calc(8px + 2px);font-size:9px;color:rgba(201,168,76,.5);
  background:none;border:none;border-top:2px solid transparent;
  cursor:pointer;font-family:var(--fn);letter-spacing:.2px;
  display:flex;flex-direction:column;align-items:center;gap:3px;min-height:52px}
.nb.on{color:var(--gold);border-top-color:var(--gold)}
.nbi{font-size:19px;line-height:1}

/* CARD */
.card{background:linear-gradient(135deg,#261508,#2C1810);border:var(--bord);
  border-radius:12px;padding:14px;margin-bottom:10px;position:relative;overflow:hidden}
.card::before{content:"";position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(201,168,76,.27),var(--gold),rgba(201,168,76,.27),transparent)}
.ct{font-family:var(--fn);font-size:9px;font-weight:600;color:var(--gold);
  text-transform:uppercase;letter-spacing:2px;margin-bottom:10px;
  display:flex;align-items:center;gap:8px}
.ct::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,rgba(201,168,76,.27),transparent)}

/* BUTTONS */
.btn{padding:13px 16px;border-radius:10px;border:var(--bord2);
  background:linear-gradient(135deg,#3D1F0A,#2C1810);
  cursor:pointer;font-size:15px;font-family:var(--fn);
  color:var(--gold-l);font-weight:600;
  min-height:48px;display:inline-flex;align-items:center;justify-content:center;
  -webkit-appearance:none;transition:opacity .1s}
.btn:active{opacity:.75}
.btn.pr{background:linear-gradient(135deg,var(--red),var(--red2));color:var(--gold);border-color:var(--gold)}
.btn.gold{background:linear-gradient(135deg,var(--gold-d),#6B4F10);color:var(--bg);border-color:var(--gold);font-weight:700}
.btn.w{width:100%;margin-top:8px;display:flex}
.btn[disabled]{opacity:.35;pointer-events:none}

/* ACTION GRID */
.ag{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ab{padding:13px 11px;background:linear-gradient(135deg,#261508,#1A0E08);
  border:var(--bord);border-radius:12px;cursor:pointer;text-align:left;
  min-height:84px;display:flex;flex-direction:column;justify-content:space-between;
  -webkit-appearance:none}
.ab:active{opacity:.7}
.ab[disabled]{opacity:.35;pointer-events:none}
.ic{font-size:22px;margin-bottom:4px}
.at{font-size:13px;font-weight:700;color:var(--gold-l);font-family:var(--fn)}
.ac{font-size:11px;color:rgba(201,168,76,.6);margin-top:2px;font-family:var(--fn);line-height:1.3}
.ab.red .at{color:#E05555}

/* STAT ROWS */
.sr{display:flex;align-items:center;gap:6px;margin:5px 0}
.sl{font-size:12px;color:rgba(201,168,76,.6);width:128px;flex-shrink:0;font-family:var(--fn)}
.ds{display:flex;gap:4px}
.dot{width:14px;height:14px;border-radius:50%;background:#3D1F0A;border:1px solid #5C3D2E}
.dot.on{background:var(--gold);border-color:var(--gold)}
.dot.fire{background:#E05555;border-color:#E05555}
.sn{font-size:12px;color:rgba(201,168,76,.6);margin-left:3px}

/* MARKET ITEMS */
.mi{display:flex;gap:10px;padding:12px;background:#1A0E08;
  border:var(--bord);border-radius:12px;margin-bottom:8px}
.mi-name{font-size:13px;font-weight:700;color:var(--gold-l);
  font-family:var(--fn);margin-bottom:4px}
.mi-cost{font-size:12px;color:var(--gold);font-weight:700}

/* LOG */
.le{font-size:13px;color:rgba(201,168,76,.5);padding:6px 0;
  border-bottom:1px solid rgba(201,168,76,.1);line-height:1.5;font-family:var(--fn)}
.le:last-child{border-bottom:none}
.le.red{color:#E05555}.le.grn{color:#5DBB63}.le.inf{color:var(--gold-l)}

/* BADGES */
.bdg{display:inline-block;padding:2px 8px;border-radius:5px;font-size:10px;font-weight:700;font-family:var(--fn)}
.bdg.r{background:rgba(139,26,26,.27);color:#E05555;border:1px solid rgba(224,85,85,.27)}
.bdg.g{background:rgba(26,74,26,.27);color:#5DBB63;border:1px solid rgba(93,187,99,.27)}
.bdg.o{background:rgba(107,73,16,.27);color:var(--gold);border:1px solid rgba(201,168,76,.27)}

/* MONTH TRACK */
.mt{display:flex;gap:4px;margin-bottom:12px}
.md{flex:1;padding:7px 2px;text-align:center;font-size:9px;border-radius:7px;
  background:#1A0E08;color:#5C3D2E;border:var(--bord);font-family:var(--fn);font-weight:600}
.md.done{background:var(--gold-d);color:var(--gold);border-color:var(--gold)}
.md.cur{background:linear-gradient(135deg,var(--red),var(--red2));color:var(--gold);
  border-color:var(--gold);font-weight:800}

/* BARS */
.pb{height:6px;background:#261508;border-radius:3px;overflow:hidden;margin-top:4px}
.pf{height:100%;border-radius:3px;transition:width .4s}
.pfm{background:linear-gradient(90deg,#2E7D32,#5DBB63)}
.pfd{background:linear-gradient(90deg,#185FA5,#378ADD)}

/* MOSSA BAR */
.mbar{position:relative;height:64px;background:#1A0E08;border-radius:12px;
  overflow:hidden;cursor:pointer;margin:12px 0;border:var(--bord2)}
.mz{position:absolute;top:0;height:100%;background:rgba(26,74,26,.53)}
.mt2{position:absolute;top:0;width:4px;height:100%;background:#5DBB63}
.mcu{position:absolute;top:10px;width:8px;height:44px;background:var(--red);border-radius:4px}

/* INTRO */
.intro-bg{text-align:center;padding:24px 12px}
.cg2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.cc2{padding:13px;background:#1A0E08;border:var(--bord);border-radius:12px;
  cursor:pointer;text-align:left}
.cc2:active{opacity:.7}
.cc2.sel{border:2px solid var(--gold);background:#261508}
.cc2-name{font-size:14px;font-weight:700;color:var(--gold);font-family:var(--fn)}
.cc2-desc{font-size:11px;color:rgba(201,168,76,.6);margin-top:3px;
  font-family:var(--fn);line-height:1.4}

/* RACE */
.cr-line{padding:7px 10px;border-radius:7px;margin:2px 0;font-size:13px;
  display:flex;align-items:center;gap:6px;font-family:var(--fn)}
.cr-line.p1{background:rgba(107,73,16,.13);color:var(--gold);font-weight:700}
.cr-line.pp{background:rgba(24,95,165,.13);color:#7BC8FF;font-weight:700}
.cr-line.def{background:rgba(26,14,8,.53);color:rgba(201,168,76,.5)}
.batt-box{background:#1A0E08;border-radius:8px;padding:10px 13px;margin-bottom:8px;border:var(--bord)}
.batt-nome{font-size:13px;color:var(--parch);padding:5px 0;
  border-bottom:1px solid rgba(201,168,76,.1);font-family:var(--fn)}
.batt-nome:last-child{border-bottom:none}
.batt-nome.tu{color:var(--gold);font-weight:700}

/* EVBOX */
.evbox{font-size:13px;padding:11px 13px;border-radius:10px;margin:8px 0;
  font-family:var(--fn);border-left:3px solid;line-height:1.5}
.evbox.red{background:rgba(139,26,26,.13);color:#E05555;border-color:#E05555}
.evbox.grn{background:rgba(26,74,26,.13);color:#5DBB63;border-color:#5DBB63}
.evbox.inf{background:rgba(24,95,165,.13);color:#7BC8FF;border-color:#378ADD}

/* DECO LINE */
.deco{display:flex;align-items:center;gap:8px;margin:12px 0;
  color:rgba(201,168,76,.27);font-size:12px;font-family:var(--fn)}
.deco::before,.deco::after{content:"";flex:1;height:1px;
  background:linear-gradient(90deg,transparent,rgba(201,168,76,.27))}

/* BIG SCORE */
.score-big{font-family:var(--fn);font-size:56px;font-weight:800;color:var(--gold);
  text-align:center;padding:10px 0;letter-spacing:-1px}
.result-banner{padding:16px;text-align:center;border-radius:12px;
  background:linear-gradient(135deg,rgba(139,26,26,.2),rgba(61,0,0,.4));
  border:var(--bord2);margin-bottom:12px}

/* TRAIN BUTTONS */
.train-btn{width:100%;text-align:left;padding:14px 13px;border-radius:10px;
  border:var(--bord);background:linear-gradient(135deg,#261508,#1A0E08);
  cursor:pointer;font-family:var(--fn);margin-bottom:7px;min-height:60px;
  display:block;-webkit-appearance:none}
.train-btn:active{opacity:.7}
.train-btn[disabled]{opacity:.4;pointer-events:none}
.train-title{font-weight:700;font-size:14px;color:var(--gold-l)}
.train-desc{font-size:12px;color:rgba(201,168,76,.6);margin-top:3px}
.train-desc.cap{color:#E05555}

/* RANGE */
input[type=range]{accent-color:var(--gold);height:32px;width:100%}

.sc{display:none}.sc.on{display:block}

/* iOS install hint */
.install-hint{font-size:11px;color:#5C3D2E;margin-top:20px;line-height:1.6;
  padding:10px;border-radius:8px;border:var(--bord);background:rgba(201,168,76,.04)}

/* TOAST NOTIFICATION */
.toast{position:fixed;top:calc(var(--st) + 80px);left:50%;transform:translateX(-50%);
  z-index:999;padding:12px 20px;border-radius:12px;font-family:var(--fn);
  font-size:14px;font-weight:700;text-align:center;min-width:200px;
  border:var(--bord2);pointer-events:none;
  animation:toastIn .3s ease,toastOut .4s ease 2.1s forwards}
.toast.grn{background:rgba(26,74,26,.95);color:#5DBB63;border-color:#5DBB63}
.toast.red{background:rgba(139,26,26,.95);color:#E05555;border-color:#E05555}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes toastOut{from{opacity:1}to{opacity:0}}
/* FRIENDSHIP BAR */
.ami-row{display:flex;align-items:center;gap:8px;margin:6px 0}
.ami-label{font-size:12px;color:rgba(201,168,76,.7);width:110px;flex-shrink:0;font-family:var(--fn)}
.ami-bar{flex:1;height:8px;background:#261508;border-radius:4px;overflow:hidden;border:var(--bord)}
.ami-fill{height:100%;border-radius:4px;transition:width .4s}
.ami-val{font-size:11px;color:rgba(201,168,76,.6);width:28px;text-align:right;font-family:var(--fn)}
/* SLOT BUTTONS */
.slot-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.slot-btn{padding:12px 6px;border-radius:10px;border:var(--bord2);
  background:linear-gradient(135deg,#261508,#1A0E08);cursor:pointer;
  font-family:var(--fn);text-align:center;min-height:60px}
.slot-btn:active{opacity:.75}
.slot-btn.occ{border-color:var(--gold)}
.slot-num{font-size:16px;font-weight:700;color:var(--gold)}
.slot-info{font-size:10px;color:rgba(201,168,76,.5);margin-top:3px}
/* ── FANTINO CAREER ── */
.fnt-bar-wrap{margin:6px 0}
.fnt-bar-label{font-size:10px;color:rgba(201,168,76,.6);letter-spacing:1px;text-transform:uppercase;font-family:var(--fn);margin-bottom:3px;display:flex;justify-content:space-between}
.fnt-bar{height:10px;background:#1A0E08;border-radius:5px;overflow:hidden;border:var(--bord)}
.fnt-bar-fill{height:100%;border-radius:5px;transition:width .4s}
.fnt-bar-green{background:linear-gradient(90deg,#2E7D32,#5DBB63)}
.fnt-bar-blue{background:linear-gradient(90deg,#185FA5,#378ADD)}
.fnt-bar-gold{background:linear-gradient(90deg,var(--gold-d),var(--gold))}
.fnt-star-row{display:flex;align-items:center;gap:8px;margin:5px 0}
.fnt-star-label{font-size:12px;color:rgba(201,168,76,.6);width:140px;flex-shrink:0;font-family:var(--fn)}
.fnt-stars{display:flex;gap:3px}
.fnt-star{width:16px;height:16px;border-radius:50%;background:#1A0E08;border:1px solid #5C3D2E}
.fnt-star.on{background:var(--gold);border-color:var(--gold)}
.career-choice{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:16px 0}
.career-card{padding:16px;background:linear-gradient(135deg,#261508,#1A0E08);border:var(--bord2);border-radius:14px;cursor:pointer;text-align:center}
.career-card:active{opacity:.75}
.career-card .cc-icon{font-size:36px;margin-bottom:8px}
.career-card .cc-title{font-family:var(--fn);font-size:15px;font-weight:700;color:var(--gold);margin-bottom:4px}
.career-card .cc-desc{font-size:11px;color:rgba(201,168,76,.5);line-height:1.5}


.fpip-row{display:flex;align-items:center;gap:6px}
.fpip{width:13px;height:13px;border-radius:50%;background:#1A0E08;border:1px solid #5C3D2E}
.fpip.grn{background:#5DBB63;border-color:#5DBB63}
.fpip.blu{background:#378ADD;border-color:#378ADD}
.fpip-label{font-size:10px;color:rgba(201,168,76,.5);font-family:var(--fn);letter-spacing:.5px}
</style>
</head>
<body>
<div class="app" id="APP">
<div class="hdr">
  <div><div class="hsub" id="H_ANNO">Palio di Legnano</div><div class="htit" id="H_NOME">Scegli la Contrada</div></div>
  <div class="hmese" id="H_MESE"></div>
</div>
<div class="hud" id="HUD" style="display:none">
  <div class="hc"><div class="hl">Oro</div><div class="hv o" id="HO">—</div></div>
  <div class="hc"><div class="hl">Morale</div><div class="hv v" id="HM">—</div></div>
  <div class="hc"><div class="hl">Cavallo</div><div class="hv" id="HC">—</div></div>
  <div class="hc"><div class="hl">Fantino</div><div class="hv" id="HF">—</div></div>
</div>
<div class="main" id="MAIN">
<div class="pad">
<div class="sc on" id="sc-mese">
  <div class="mt" id="MTRACK"></div>
  <div class="card">
    <div class="ct">Azioni mensili</div>
    <div class="ag" id="MAZIONI"></div>
    <div id="EVBOX"></div>
    <button class="btn pr w" id="BTN_AV" onclick="avanzaMese()">Passa al mese successivo →</button>
  </div>
  <div class="card">
    <div class="ct">Stato della contrada</div>
    <div style="font-family:var(--fn);font-size:9px;color:rgba(201,168,76,.6);letter-spacing:1px;margin-bottom:3px">MORALE</div>
    <div class="pb"><div class="pf pfm" id="BM"></div></div>
    <div style="font-family:var(--fn);font-size:9px;color:rgba(201,168,76,.6);letter-spacing:1px;margin-top:8px;margin-bottom:3px">DIFESA STALLA</div>
    <div class="pb"><div class="pf pfd" id="BD"></div></div>
  </div>
</div>
<div class="sc" id="sc-stalla">
  <div class="card" id="CARD_CAV"></div>
  <div class="card" id="CARD_FAN"></div>
</div>
<div class="sc" id="sc-mercato">
  <div class="card"><div class="ct">Fantini disponibili</div><div id="MKT_F"></div></div>
  <div class="card"><div class="ct">Cavalli disponibili</div><div id="MKT_C"></div></div>
</div>
<div class="sc" id="sc-politica">
  <div class="card"><div class="ct">Scegli il bersaglio</div><div id="POL_B"></div></div>
  <div class="card">
    <div class="ct">Tipo di azione</div>
    <div class="ag">
      <button class="ab red" onclick="setPT('SCHERZO')"><div class="ic">🎨</div><div class="at">Scherzo</div><div class="ac">-15 morale avversario</div></button>
      <button class="ab red" onclick="setPT('IMBOSCATA')"><div class="ic">🌶️</div><div class="at">Imboscata</div><div class="ac">+nervosismo cavallo</div></button>
    </div>
    <div id="POL_MSG" style="font-size:13px;color:rgba(201,168,76,.6);margin-top:8px;font-family:var(--fn)"></div>
    <button class="btn pr w" onclick="eseguiPol()">Esegui azione politica</button>
  </div>
</div>
<div class="sc" id="sc-contrade">
  <div class="card"><div class="ct">Tutte le contrade</div><div id="ALLCT"></div></div>
</div>
<div class="sc" id="sc-log">
  <div class="card"><div class="ct">Diario del Capitano</div><div id="LOGL"></div></div>
</div>
</div>
</div>
<div class="nav" id="NAV" style="display:none">
  <button class="nb on" onclick="goTo('mese')"><span class="nbi">📅</span>Mese</button>
  <button class="nb" onclick="goTo('stalla')"><span class="nbi">🐎</span>Stalla</button>
  <button class="nb" onclick="goTo('mercato')"><span class="nbi">🛒</span>Mercato</button>
  <button class="nb" onclick="goTo('politica')"><span class="nbi">⚔️</span>Politica</button>
  <button class="nb" onclick="goTo('contrade')"><span class="nbi">🏰</span>Contrade</button>
  <button class="nb" onclick="goTo('log')"><span class="nbi">📜</span>Diario</button>
</div>
</div>
<script>
const CDB={
  Flora:        {nemica:"SanMartino",   bonus:"ALTA_FINANZA",      desc:"Inizia con 4000 oro",            budget:4000,morale:60},
  Legnarello:   {nemica:"SantAmbrogio", bonus:"VOLANO_POPOLARE",   desc:"Budget legato al morale",        budget:3000,morale:60},
  SanBernardino:{nemica:"SanMagno",     bonus:"DIPLOMAZIA_ASTUTA", desc:"−30% rischio intrighi politici", budget:3000,morale:60},

};
const NF=["Aceto","Il Pesse","Massimino","Tittia","Scompiglio","Gingillo","Tremante","Brigante","Bighino","Cittino","Richi Dimo"];
const NC=["Fulmine","Tempesta","Vento","Spirit","Dardo","Ombra","Abbagliante","Guerriero","Woody","Pannocchia","Star","Odi et Amo"];
const MESI=["Gennaio","Febbraio","Marzo","Aprile","Maggio"];
let G=null,MKT=null,PB=null,PT="SCHERZO",MosInt=null,Mos={};
const rnd=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
const rf=(a,b)=>Math.random()*(b-a)+a;
const sample=(arr,n)=>[...arr].sort(()=>Math.random()-.5).slice(0,n);
const clamp=(v,mn,mx)=>Math.max(mn,Math.min(mx,v));
const R=id=>document.getElementById(id);

// ── TOAST ──
function showToast(msg,tipo){
  document.querySelectorAll('.toast').forEach(t=>t.remove());
  const d=document.createElement('div');
  d.className='toast '+(tipo||'grn');d.textContent=msg;
  document.getElementById('APP').appendChild(d);
  setTimeout(()=>d.remove(),2600);
}

// ── SLOT SAVE/LOAD ──
function slotKey(n){return 'palio_slot_'+n;}
function salva(){if(!G)return;try{localStorage.setItem(slotKey(G.slot||1),JSON.stringify(G));}catch(e){}}
function slotInfo(n){
  try{const s=localStorage.getItem(slotKey(n));if(!s)return null;
  const d=JSON.parse(s);return {anno:d.anno,nome:d.nome,trofei:d.trofei||0};}catch(e){return null;}
}
function mostraSlotScreen(mode){
  // mode: 'new' | 'load'
  R('NAV').style.display='none';
  let html=`<div style="text-align:center;margin-bottom:16px">
    <div style="font-size:13px;color:rgba(201,168,76,.6);font-family:var(--fn)">${mode==='new'?'Scegli slot per la nuova partita':'Carica una partita salvata'}</div>
  </div><div class="slot-grid">`;
  for(let i=1;i<=3;i++){
    const inf=slotInfo(i);
    html+=`<div class="slot-btn ${inf?'occ':''}" onclick="slotAzione(${i},'${mode}')">
      <div class="slot-num">Slot ${i}</div>
      <div class="slot-info">${inf?inf.nome+'<br>Anno '+inf.anno+' · 🏆'+inf.trofei:'Vuoto'}</div>
    </div>`;
  }
  html+=`</div><button class="btn w" onclick="renderIntro()" style="margin-top:8px">← Indietro</button>`;
  setMain('<div style="padding:20px 12px">'+html+'</div>');
}
let _slotNuovo=1;
function slotAzione(n,mode){
  if(mode==='load'){
    const s=localStorage.getItem(slotKey(n));
    if(!s){showToast('Slot '+n+' vuoto!','red');return;}
    G=JSON.parse(s);G.slot=n;
    if(!G.amicizia) inizAmicizia();
    if(!G.trofeiPerContrada) G.trofeiPerContrada={};
    if(!Array.isArray(G.stalla)) G.stalla=G.cav?[G.cav]:[];
    G.cav=G.stalla[0]||null;
    G.cavSelIdx=0;
    MKT=genMkt();avviaUI();showToast('Partita caricata — Anno '+G.anno,'grn');
  } else {
    _slotNuovo=n;
    mostraSceltaContrada();
  }
}
function mostraSceltaContrada(){
  let html=`<div style="text-align:center;margin-bottom:12px">
    <div style="font-size:22px;font-weight:800;color:var(--gold);font-family:var(--fn)">Scegli la Contrada</div>
  </div><div class="cg2" id="CG2" style="margin-bottom:14px"></div><div id="BTN_START2"></div>
  <button class="btn w" onclick="mostraSlotScreen('new')" style="margin-top:8px">← Indietro</button>`;
  setMain('<div style="padding:12px">'+html+'</div>');
  R('CG2').innerHTML=Object.entries(CDB).map(([k,v])=>
    `<div class="cc2" onclick="selCt2('${k}')" id="CI2_${k}">
      <div class="cc2-name">${k}</div><div class="cc2-desc">${v.desc}</div></div>`).join('');
}
function selCt2(k){
  document.querySelectorAll('[id^="CI2_"]').forEach(e=>e.classList.remove('sel'));
  R('CI2_'+k).classList.add('sel');
  R('BTN_START2').innerHTML=`<button class="btn gold w" onclick="inizia2('${k}')">⚜ Inizia con ${k} →</button>`;
}
function inizia2(k){
  const n=_slotNuovo||1;
  const db=CDB[k];
  // preserve trofeiPerContrada across slots — G may be null here
  const tpc=(G&&G.trofeiPerContrada)||{};
  G={nome:k,nemica:db.nemica,bonus:db.bonus,oro:db.budget,morale:db.morale,difesa:0,mi:0,
     stalla:[],cav:null,cavSelIdx:0,fan:null,log:[],trofei:0,anno:2026,slot:n,
     raccoltaUsata:false,cenaUsata:false,sicurezzaUsata:false,eventoUsato:false,
     puntSfilata:0,_bP:null,_bIA:null,_qP:null,_qIA:null,
     amicizia:{},trofeiPerContrada:tpc};
  inizAmicizia();
  MKT=genMkt();addLog('Benvenuto Capitano! Guida la '+k+' alla vittoria.','inf');
  avviaUI();salva();showToast('Partita iniziata — Slot '+n,'grn');
}

// ── AMICIZIA ──
function inizAmicizia(){
  if(!G)return;
  G.amicizia={};
  Object.keys(CDB).forEach(k=>{
    if(k===G.nome)return;
    G.amicizia[k]= k===G.nemica ? 0 : rnd(30,70);
  });
}
function modAmicizia(k,delta){
  if(!G||!G.amicizia)return;
  if(k===G.nome)return;
  G.amicizia[k]=clamp((G.amicizia[k]||0)+delta,0,100);
}
function nervosismoAmiziaBatteria(partecipanti){
  // avg amicizia delle contrade in batteria (escluso il giocatore)
  const altri=partecipanti.filter(n=>n!==G.nome);
  if(!altri.length)return;
  const avg=altri.reduce((s,n)=>s+(G.amicizia[n]||50),0)/altri.length;
  if(avg<=65&&G.cav){
    G.cav.ner=clamp(G.cav.ner+1,1,5);
    addLog('Clima teso in batteria (amicizia media '+Math.round(avg)+'): +1 nervosismo cavallo','red');
  }
}

// ── DOTS / STATS ──
function dotsH(v,max=5,fire=false){let h='<div class="ds">';for(let i=0;i<max;i++)h+=`<div class="dot${i<Math.round(v)?(fire?' fire':' on'):''}"></div>`;return h+'</div>';}
function sRow(l,v,max=5,fire=false){return `<div class="sr"><span class="sl">${l}</span>${dotsH(v,max,fire)}<span class="sn">${(+v).toFixed(1)}</span></div>`;}
function sRowCapped(l,v,capMax,fire=false){
  let h=`<div class="sr"><span class="sl">${l}</span><div class="ds">`;
  for(let i=0;i<5;i++){
    if(i<capMax) h+=`<div class="dot${i<Math.round(v)?(fire?' fire':' on'):''}"></div>`;
    else h+=`<div class="dot" style="opacity:.18;border-style:dashed"></div>`;
  }
  h+=`</div><span class="sn">${(+v).toFixed(1)}/<span style="color:${capMax<5?'#E05555':'inherit'}">${capMax}</span></span></div>`;
  return h;
}
function amiBar(k){
  const v=G.amicizia[k]||0;
  const col=v>=70?'#5DBB63':v>=40?'var(--gold)':'#E05555';
  return `<div class="ami-row"><span class="ami-label">${k}</span>
    <div class="ami-bar"><div class="ami-fill" style="width:${v}%;background:${col}"></div></div>
    <span class="ami-val">${v}</span></div>`;
}

// ── MARKET ──
function newFan(nome){const b=rnd(1,5),e=rnd(1,5),m=rnd(1,5),em=rnd(1,5);let c=Math.floor(((b+e+m+em)/4)*450*(0.9+Math.random()*.3));if(G&&G.bonus==="PRESTIGIO_STORICO")c=Math.floor(c*.8);return {nome,bravura:b,esp:e,mossa:m,emp:em,costo:c};}
function newCav(nome,elite=false){const v=elite?5:rnd(1,5),a=elite?5:rnd(1,5),t=elite?5:rnd(1,5),r=elite?5:rnd(1,5),n=elite?1:rnd(1,3);let val=Math.floor(((v+a+t+r)/4)*450);if(G&&G.bonus==="ALLEVAMENTO_TOP")val=Math.floor(val*.8);return {nome,vel:v,acc:a,ten:t,res:r,ner:n,valore:val,maxAcc:5,maxRes:5};}
function newIACav(){return {vel:rnd(2,5),acc:rnd(2,5),ten:rnd(2,5),res:rnd(2,5),ner:rnd(1,3)};}
function newIAFan(){return {bravura:rnd(2,5),esp:rnd(2,5),mossa:rnd(2,5),emp:rnd(2,5)};}
function genMkt(){const f=sample(NF,5).map(n=>newFan(n));const c=sample(NC,5).map(n=>newCav(n));return {f,c};}

// ── LOG / HUD ──
function addLog(msg,tipo=''){if(!G)return;G.log.unshift({msg,tipo,mese:MESI[Math.min(G.mi,4)]||'—'});if(G.log.length>100)G.log.pop();}
function showEv(msg,tipo){const el=R('EVBOX');if(!el)return;el.innerHTML=`<div class="evbox ${tipo||'inf'}">${msg}</div>`;}
function updHUD(){
  if(!G)return;
  R('HO').textContent=G.oro+' oro';
  R('HM').textContent=G.morale+'/200';
  const cavNome=G.stalla&&G.stalla.length?G.stalla.map(c=>c.nome).join(', '):'—';
  R('HC').textContent=cavNome;
  R('HF').textContent=G.fan?G.fan.nome:'—';
  R('H_NOME').textContent=G.nome;
  R('H_ANNO').textContent='Anno '+G.anno+' · Slot '+G.slot;
  R('H_MESE').textContent=MESI[Math.min(G.mi,4)];
  const bm=R('BM'),bd=R('BD');
  if(bm)bm.style.width=(G.morale/200*100)+'%';
  if(bd)bd.style.width=(G.difesa/5*100)+'%';
}

// ── NAV ──
function goTo(id){
  document.querySelectorAll('.sc').forEach(s=>s.classList.remove('on'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  R('sc-'+id).classList.add('on');
  R('MAIN').scrollTop=0;
  const ids=['mese','stalla','mercato','politica','contrade','log'];
  document.querySelectorAll('.nb')[ids.indexOf(id)].classList.add('on');
  if(id==='stalla')renderStalla();
  if(id==='mercato')renderMkt();
  if(id==='politica')renderPol();
  if(id==='contrade')renderAllCt();
  if(id==='log')renderLog();
  if(id==='mese'){renderMtrack();renderMazioni();}
}

function renderMtrack(){const el=R('MTRACK');if(!el||!G)return;el.innerHTML=MESI.map((m,i)=>`<div class="md ${i<G.mi?'done':''} ${i===G.mi?'cur':''}">${m.substr(0,3).toUpperCase()}</div>`).join('');}

// ── MESE AZIONI ──
function renderMazioni(){
  const el=R('MAZIONI');if(!el||!G)return;
  const costoAll=G.bonus==='SCUDERIA_ELITE'?200:400;
  const noRF=G.raccoltaUsata,noCena=G.cenaUsata,noSic=G.sicurezzaUsata;
  const noAll=!G.stalla||!G.stalla.length||G.oro<costoAll;
  el.innerHTML=`
    <button class="ab" ${noRF?'disabled':''} onclick="${noRF?'':'doAz(\'raccolta\')'}">
      <div class="ic">⛪</div><div class="at">Raccolta fondi</div>
      <div class="ac">${noRF?'Già usata':'+ '+(G.bonus==="RACCOLTA_FONDI"?'300':'200')+' oro, -5 morale'}</div></button>
    <button class="ab" ${noCena?'disabled':''} onclick="${noCena?'':'doAz(\'cena\')'}">
      <div class="ic">🍷</div><div class="at">Cena in maniero</div>
      <div class="ac">${noCena?'Già usata':'− 100 oro, +15 morale'}</div></button>
    <button class="ab" ${noSic?'disabled':''} onclick="${noSic?'':'doAz(\'sicurezza\')'}">
      <div class="ic">🛡️</div><div class="at">Rinforza stalla</div>
      <div class="ac">${noSic?'Già usata':'− 300 oro, +2 difesa'}</div></button>
    <button class="ab" ${noAll?'disabled':''} onclick="${noAll?'':'goTo(\'stalla\')'}">
      <div class="ic">🏋️</div><div class="at">Allenamento cavallo</div>
      <div class="ac">${!G.stalla||!G.stalla.length?'Serve un cavallo':G.oro<costoAll?'Servono '+(costoAll)+' oro':'− '+costoAll+' oro'}</div></button>`;
  const btn=R('BTN_AV');
  if(btn)btn.textContent=G.mi===4?'⚔ Vigilia del Palio →':'Passa al mese successivo →';
}

function doAz(tipo){
  if(!G)return;
  if(tipo==='raccolta'){
    if(G.raccoltaUsata)return;
    const g=G.bonus==='RACCOLTA_FONDI'?300:200;
    G.oro+=g;G.morale=clamp(G.morale-5,0,200);G.raccoltaUsata=true;
    addLog('Raccolta fondi +'+g+' oro','inf');showEv('✦ Raccolta fondi! +'+g+' oro, -5 morale','grn');
  } else if(tipo==='cena'){
    if(G.cenaUsata)return;
    if(G.oro<100){showEv('Oro insufficiente (100 necessari).','red');return;}
    const bn=G.bonus==='RACCOLTA_FONDI'?30:0;
    G.oro-=(100-bn);G.morale=clamp(G.morale+15,0,200);G.cenaUsata=true;
    addLog('Cena in maniero. +15 morale','inf');showEv('✦ Cena in maniero! +15 morale','grn');
  } else if(tipo==='sicurezza'){
    if(G.sicurezzaUsata)return;
    if(G.oro<300){showEv('Oro insufficiente (300 necessari).','red');return;}
    G.oro-=300;G.difesa=clamp(G.difesa+2,0,5);G.sicurezzaUsata=true;
    addLog('Stalla rinforzata. Difesa +2','inf');showEv('✦ Stalla rinforzata! Difesa '+G.difesa+'/5','grn');
  }
  updHUD();renderMazioni();salva();
}

function avanzaMese(){
  if(!G)return;
  if(G.mi===4){showSceltaCavallo();return;}
  if(G.difesa>0)G.difesa--;
  G.oro+=100;G.raccoltaUsata=false;G.cenaUsata=false;G.sicurezzaUsata=false;
  const attaccato=Math.random()<.3&&G.difesa<3;
  let msg='Mese tranquillo. +100 oro.',tipo='inf';
  if(attaccato){
    if(Math.random()<.5){G.morale=clamp(G.morale-25,0,200);msg='Attacco nemico! −25 morale';tipo='red';}
    else if(G.stalla&&G.stalla.length){G.stalla[G.cavSelIdx||0].ner=clamp(G.stalla[G.cavSelIdx||0].ner+1,1,5);msg='Scherzo nemico! +1 nervosismo al cavallo';tipo='red';}
  } else if(!G.eventoUsato){
    const r=Math.random();
    if(r<.15){G.oro+=800;msg='Un ex contradaiolo invia 800 oro!';tipo='grn';G.eventoUsato=true;}
    else if(r<.28&&G.fan){G.fan.bravura=clamp(G.fan.bravura-1,1,5);msg='Il fantino ha l\'influenza! −1 bravura';tipo='red';G.eventoUsato=true;}
    else if(r<.38){G.oro=Math.max(0,G.oro-600);msg='Multa per cena proibita! −600 oro';tipo='red';G.eventoUsato=true;}
  }
  addLog(msg,tipo);showEv(msg,tipo);
  G.mi++;MKT=genMkt();updHUD();renderMtrack();renderMazioni();salva();
}

// ── STALLA (multi cavallo) ──
function renderStalla(){
  if(!G)return;
  const cv=R('CARD_CAV'),cf=R('CARD_FAN');
  if(!G.stalla)G.stalla=G.cav?[G.cav]:[];
  if(G.stalla.length){
    let html='<div class="ct">I tuoi destrieri</div>';
    G.stalla.forEach((c,idx)=>{
      const accAtMax=c.acc>=c.maxAcc,resAtMax=c.res>=c.maxRes;
      const costoAll=G.bonus==='SCUDERIA_ELITE'?200:400;
      const eta=c.maxAcc<5||c.maxRes<5?`<div style="font-size:11px;color:#E05555;margin-bottom:6px">⚠ ${5-Math.min(c.maxAcc,c.maxRes)} anno/i — acc e res al massimo attuale.</div>`:'';
      html+=`<div style="border:var(--bord);border-radius:10px;padding:12px;margin-bottom:10px;background:#1A0E08">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
          <div style="font-family:var(--fn);font-size:14px;font-weight:700;color:var(--gold)">${c.nome}</div>
          <button class="btn" style="font-size:11px;padding:5px 10px" onclick="vendiCav(${idx})">Vendi (${Math.floor(c.valore*.5)} oro)</button>
        </div>
        ${eta}
        ${sRow('Velocità',c.vel)}${sRowCapped('Accelerazione',c.acc,c.maxAcc)}
        ${sRow('Tenuta curva',c.ten)}${sRowCapped('Resistenza',c.res,c.maxRes)}
        ${sRow('Nervosismo',c.ner,5,true)}
        <div style="font-size:10px;color:rgba(201,168,76,.5);margin-top:8px;margin-bottom:4px;font-family:var(--fn);letter-spacing:1px;text-transform:uppercase">Allenamento · ${costoAll} oro</div>
        <div style="display:flex;flex-direction:column;gap:5px">
          <button class="train-btn" onclick="allena('forza',${idx})"><div class="train-title">Forza pura</div><div class="train-desc">+1 Velocità, +1 Nervosismo</div></button>
          <button class="train-btn" ${accAtMax?'disabled':''} onclick="allena('controllo',${idx})"><div class="train-title">Controllo e ritmo</div><div class="train-desc ${accAtMax?'cap':''}">${accAtMax?'Accelerazione al massimo ('+c.maxAcc+')':'+1 Accelerazione, −1 Nervosismo'}</div></button>
          <button class="train-btn" ${resAtMax?'disabled':''} onclick="allena('fondo',${idx})"><div class="train-title">Fondo e curve</div><div class="train-desc ${resAtMax?'cap':''}">${resAtMax?'Resistenza al massimo ('+c.maxRes+')':'+1 Tenuta curva, +1 Resistenza'}</div></button>
        </div>
      </div>`;
    });
    cv.innerHTML=html;
  } else {
    cv.innerHTML='<div class="ct">I tuoi destrieri</div><div style="font-size:14px;color:rgba(201,168,76,.5)">Nessun cavallo in stalla. Vai al mercato.</div>';
  }
  if(G.fan){
    const f=G.fan;
    cf.innerHTML=`<div class="ct">Il tuo fantino</div>
      <div style="font-family:var(--fn);font-size:16px;font-weight:700;color:var(--gold);margin-bottom:10px">${f.nome}</div>
      ${sRow('Bravura',f.bravura)}${sRow('Esperienza',f.esp)}
      ${sRow('Gestione mossa',f.mossa)}${sRow('Empatia',f.emp)}
      <button class="btn w" onclick="licFan()">Licenzia fantino</button>`;
  } else {
    cf.innerHTML='<div class="ct">Il tuo fantino</div><div style="font-size:14px;color:rgba(201,168,76,.5)">Nessun fantino. Vai al mercato.</div>';
  }
}

function allena(tipo,idx){
  if(!G.stalla||!G.stalla[idx])return;
  const costoAll=G.bonus==='SCUDERIA_ELITE'?200:400;
  if(G.oro<costoAll){showToast('Oro insufficiente!','red');return;}
  const c=G.stalla[idx];G.oro-=costoAll;
  if(tipo==='forza'){c.vel=clamp(c.vel+1,1,5);c.ner=clamp(c.ner+1,1,5);addLog('Allenamento Forza su '+c.nome,'inf');}
  else if(tipo==='controllo'){c.acc=clamp(c.acc+1,1,c.maxAcc);c.ner=clamp(c.ner-1,1,5);addLog('Allenamento Controllo su '+c.nome,'inf');}
  else if(tipo==='fondo'){c.ten=clamp(c.ten+1,1,5);c.res=clamp(c.res+1,1,c.maxRes);addLog('Allenamento Fondo su '+c.nome,'inf');}
  showToast('✦ Allenamento completato!','grn');
  updHUD();renderStalla();salva();
}
function vendiCav(idx){
  if(!G.stalla||!G.stalla[idx])return;
  const c=G.stalla[idx];const v=Math.floor(c.valore*.5);
  G.oro+=v;addLog('Venduto '+c.nome+' per '+v+' oro','inf');
  G.stalla.splice(idx,1);
  if(G.cavSelIdx>=G.stalla.length)G.cavSelIdx=Math.max(0,G.stalla.length-1);
  G.cav=G.stalla[G.cavSelIdx]||null;
  updHUD();renderStalla();salva();
}
function licFan(){if(!G.fan)return;addLog(G.fan.nome+' licenziato','inf');G.fan=null;updHUD();renderStalla();salva();}

// ── SCELTA CAVALLO A MAGGIO ──
function showSceltaCavallo(){
  if(!G.cav&&(!G.stalla||!G.stalla.length)){alert('Per il Palio serve almeno un cavallo!');return;}
  if(!G.fan){alert('Per il Palio serve un fantino!');return;}
  if(!G.stalla||G.stalla.length<=1){
    // un solo cavallo, nessuna scelta
    G.cavSelIdx=0;G.cav=G.stalla[0];
    showVigilia();return;
  }
  R('NAV').style.display='none';
  let html=`<div style="text-align:center;margin-bottom:14px">
    <div style="font-size:30px">🐎</div>
    <div style="font-family:var(--fn);font-size:17px;font-weight:700;color:var(--gold);margin-top:6px">Scegli il cavallo per il Palio</div>
    <div style="font-size:12px;color:rgba(201,168,76,.5);margin-top:4px">Hai più cavalli in stalla — scegli quello che correrà</div>
  </div>`;
  G.stalla.forEach((c,i)=>{

function sorteggiMeteo(){

}
function applicaMeteoACav(cav,meteo){
  // effetti temporanei: salviamo in _meteoPen
  cav._meteoPen={ten:0,res:0};
  if(meteo==='pioggia') cav._meteoPen.ten=1;
  else if(meteo==='sole cocente') cav._meteoPen.res=1;
}
function ripristinaMeteo(cav){delete cav._meteoPen;}
function meteoHTML(meteo){

}

// ── MERCATO ──
function mktItem(item,isF,i){
  const stats=isF
    ?sRow('Bravura',item.bravura)+sRow('Esperienza',item.esp)+sRow('Gestione mossa',item.mossa)+sRow('Empatia',item.emp)
    :sRow('Velocità',item.vel)+sRow('Accelerazione',item.acc)+sRow('Tenuta curva',item.ten)+sRow('Resistenza',item.res)+sRow('Nervosismo',item.ner,5,true);
  const costo=isF?item.costo:item.valore;
  return `<div class="mi"><div style="flex:1"><div class="mi-name">${item.nome} <span class="mi-cost">${costo} oro</span></div>${stats}</div>
    <div><button class="btn pr" style="font-size:13px;padding:11px 13px" onclick="${isF?'buyF':'buyC'}(${i})">${isF?'Ingaggia':'Acquista'}</button></div></div>`;
}
function renderMkt(){if(!MKT)MKT=genMkt();R('MKT_F').innerHTML=MKT.f.map((f,i)=>mktItem(f,true,i)).join('');R('MKT_C').innerHTML=MKT.c.map((c,i)=>mktItem(c,false,i)).join('');}
function buyF(i){const f=MKT.f[i];if(G.oro<f.costo){showToast('Oro insufficiente!','red');return;}G.oro-=f.costo;G.fan=f;MKT.f.splice(i,1);addLog('Ingaggiato '+f.nome+' per '+f.costo+' oro','inf');updHUD();renderMkt();salva();}
function buyC(i){
  const c=MKT.c[i];if(G.oro<c.valore){showToast('Oro insufficiente!','red');return;}
  G.oro-=c.valore;
  if(!G.stalla)G.stalla=[];
  G.stalla.push(c);
  if(!G.cav){G.cav=c;G.cavSelIdx=0;}
  MKT.c.splice(i,1);
  addLog('Acquistato '+c.nome+' per '+c.valore+' oro','inf');
  updHUD();renderMkt();salva();
}

function renderPol(){
  const altre=Object.keys(CDB).filter(k=>k!==G.nome);

    const isN=k===G.nemica;

    const col=ami>=70?'#5DBB63':ami>=40?'var(--gold)':'#E05555';
    return `<div class="mi" style="cursor:pointer;flex-direction:column" onclick="selPB('${k}')" id="PB_${k}">
      <div style="display:flex;align-items:center;justify-content:space-between;width:100%;margin-bottom:6px">
        <div style="font-size:13px;font-weight:700;color:var(--gold-l);font-family:var(--fn)">${k} ${isN?'<span class="bdg r">nemica</span>':''}</div>
        <div style="font-size:12px;font-weight:700;color:${col}">${ami}/100</div>
      </div>
      ${amiBar(k)}
    </div>`;
  }).join('');
  R('POL_MSG').textContent=PB?'Bersaglio: '+PB+' — Azione: '+PT:'Seleziona un bersaglio';
}
function selPB(k){PB=k;document.querySelectorAll('[id^="PB_"]').forEach(e=>e.style.borderColor='');R('PB_'+k).style.borderColor='var(--gold)';R('POL_MSG').textContent='Bersaglio: '+k+' — Azione: '+PT;}
function setPT(t){PT=t;R('POL_MSG').textContent=(PB?'Bersaglio: '+PB:'Seleziona bersaglio')+' — Azione: '+t;}

function eseguiPol(){
  if(!PB){showToast('Seleziona un bersaglio!','red');return;}
  const isN=PB===G.nemica;
  if(PT==='ACCORDO'){
    if(isN){showToast('Non puoi fare accordi con la tua nemica!','red');return;}
    if(G.oro<300){showToast('Servono 300 oro per l\'accordo!','red');return;}
    G.oro-=300;modAmicizia(PB,25);
    addLog('Accordo con '+PB+'. Amicizia +25','inf');
    showToast('✦ Accordo stipulato con '+PB+'! +25 amicizia','grn');
    PB=null;updHUD();renderPol();salva();return;
  }
  const mod=G.bonus==='DIPLOMAZIA_ASTUTA'?.70:1;
  const scoperto=Math.random()<.3*mod;
  if(scoperto){
    G.oro=Math.max(0,G.oro-300);G.morale=clamp(G.morale-10,0,200);
    modAmicizia(PB,-10);
    addLog('SCOPERTO su '+PB+'! −300 oro, amicizia −10','red');
    showToast('✗ SCOPERTO! −300 oro, −10 amicizia con '+PB,'red');
  } else {
    if(PT==='SCHERZO'){
      G.morale=clamp(G.morale+10,0,200);modAmicizia(PB,10);
      addLog('Scherzo su '+PB+' riuscito! +10 morale, +10 amicizia '+PB,'inf');
      showToast('✦ Scherzo riuscito su '+PB+'! +10 amicizia','grn');
    } else {
      modAmicizia(PB,10);
      const cav=G.stalla&&G.stalla.length?G.stalla[0]:null;
      if(cav&&isN)cav.ner=clamp(cav.ner-0.5,1,5);
      addLog('Imboscata su '+PB+(isN?' (nemica)':'')+' riuscita! +10 amicizia','inf');
      showToast('✦ Imboscata riuscita su '+PB+'!','grn');
    }
  }
  PB=null;updHUD();renderPol();salva();
}

function fermaMossa(fase){
  if(!Mos.active)return;Mos.active=false;clearInterval(MosInt);MosInt=null;
  const d=Math.abs(Mos.pos-Mos.tacca);let esito,mult,msg;
  if(d<=Mos.amp/2){esito='OTTIMALE';mult=1.15;msg='⚡ PARTENZA A FIONDA! Sei schizzato primo!';}
  else if(Mos.pos>Mos.tacca+Mos.amp/2){esito='FALSA';mult=.1;msg='✗ PARTENZA FALSA! Riparti ultimo.';}
  else{esito='LENTA';mult=.5;msg='⚠ PARTENZA LENTA… Sei rimasto al canapo.';}
  Mos.mult=mult;
  R('MOS_RIS').style.display='block';
  const t=R('MOS_T');t.textContent=msg;
  t.style.color=esito==='OTTIMALE'?'#5DBB63':esito==='FALSA'?'#E05555':'var(--gold)';
  R('MOS_B').textContent=`Posizione: ${Math.round(Mos.pos)} · Tacca: ${Math.round(Mos.tacca)} · Distanza: ${Math.round(d)} · Moltiplicatore: ×${mult}`;
  addLog('Mossa ('+fase+'): '+esito+' ×'+mult,'inf');
  const btn=R('MOS_BTN');

    if(fase==='batteria'){btn.textContent='⚔ Via! Corri la batteria →';btn.onclick=avviaCorsa;}
    else{btn.textContent='⚔ Via! Corri la finale →';btn.onclick=avviaFinale;}
  }
}

// ── CORSA ──
function scoreGiro(isPlayer,giro,mult){
  const cOrig=isPlayer?G.cav:newIACav();const f=isPlayer?G.fan:newIAFan();
  const pen=isPlayer&&cOrig&&cOrig._meteoPen?cOrig._meteoPen:{ten:0,res:0};
  const resEff=Math.max(1,cOrig.res-(pen.res||0));
  const tenEff=Math.max(1,cOrig.ten-(pen.ten||0));
  const fatica=Math.max(0,(giro-1)*(6-resEff)*.2);
  const base=(cOrig.vel+cOrig.acc+tenEff)-fatica+(f.bravura*.5+f.emp*.2);
  return base*((giro===1&&isPlayer)?mult:1)+rf(0,3);
}
function simBatteria(nomi,giri,isPlayerBatt){
  const sc={};nomi.forEach(n=>sc[n]=0);const gpg=[];
  for(let g=1;g<=giri;g++){
    nomi.forEach(n=>{sc[n]+=scoreGiro(isPlayerBatt&&n===G.nome,g,Mos.mult);});
    gpg.push([...Object.entries(sc)].sort((a,b)=>b[1]-a[1]).map(x=>x[0]));
  }
  return gpg;
}
function avviaCorsa(){
  const bP=G._bP,bIA=G._bIA;
  const gpgP=simBatteria(bP,4,true);const gpgIA=simBatteria(bIA,4,false);
  const qP=gpgP[gpgP.length-1].slice(0,2);const qIA=gpgIA[gpgIA.length-1].slice(0,2);
  G._qP=qP;G._qIA=qIA;salva();showBatterie(bP,gpgP,qP,bIA,gpgIA,qIA);
}
function showBatterie(bP,gpgP,qP,bIA,gpgIA,qIA){
  const playerIn=qP.includes(G.nome);const finalisti=[...qP,...qIA];
  let html=`<div style="text-align:center;margin-bottom:12px"><div style="font-size:28px">🏇</div>

  for(let g=0;g<gpgIA.length;g++){
    html+=`<div style="margin-bottom:8px"><div style="font-family:var(--fn);font-size:9px;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-bottom:3px">Giro ${g+1}</div>`;
    gpgIA[g].forEach((nome,pos)=>{const isQ=pos<2&&g===gpgIA.length-1;html+=`<div class="cr-line def">${pos+1}° ${nome}${isQ?' <span class="bdg g">qualificato</span>':''}</div>`;});
    html+=`</div>`;

    <div style="font-family:var(--fn);font-size:14px;font-weight:700;color:${playerIn?'#5DBB63':'var(--gold)'};margin-bottom:6px">${playerIn?'⚜ Sei qualificato alla finale!':'Non sei qualificato per la finale. Guardi dalle tribune...'}</div>

    <button class="btn gold w" onclick="${playerIn?'showMossa(\'finale\')':'avviaFinaleSpettatore()'}">${playerIn?'⚔ Prepara la finale! Nuova fase di mossa →':'👀 Guarda la finale →'}</button>
  </div>`;

}
function avviaFinaleSpettatore(){
  Mos.mult=1.0;
  // Applica nervosismo amicizia anche per la finale spettatore
  nervosismoAmiziaBatteria([...G._qP,...G._qIA]);
  const finalisti=[...G._qP,...G._qIA];
  const gpgF=simBatteria(finalisti,5,false);
  showFinale(finalisti,gpgF,false);
}
function avviaFinale(){
  // Applica nervosismo amicizia finale
  nervosismoAmiziaBatteria([...G._qP,...G._qIA]);
  const finalisti=[...G._qP,...G._qIA];
  const playerIn=finalisti.includes(G.nome);
  const gpgF=simBatteria(finalisti,5,playerIn);
  showFinale(finalisti,gpgF,playerIn);
}
function showFinale(finalisti,gpgF,playerIn){
  if(G&&G.cav)ripristinaMeteo(G.cav);
  const classFinale=gpgF[gpgF.length-1];const vincitore=classFinale[0];

  }
  html+=`</div><div class="result-banner">
    <div style="font-size:${playerVince?'32':'24'}px;margin-bottom:6px">${playerVince?'🥇':playerIn?'🎖':'👀'}</div>
    <div style="font-family:var(--fn);font-size:${playerVince?'15':'13'}px;font-weight:700;color:${playerVince?'var(--gold)':'var(--parch)'}">
      ${playerVince?'HAI VINTO IL PALIO! Le campane suonano per '+G.nome.toUpperCase()+'!':playerIn?'Sei arrivato '+posFin+'°. Ottima prestazione.':'La finale si è conclusa. Vince '+vincitore+'.'}
    </div>
    <div style="font-size:11px;color:rgba(201,168,76,.5);margin-top:6px">Sfilata: ${G.puntSfilata} pt · Anno: ${G.anno} · Trofei: ${G.trofei||0}</div>
    <div style="font-size:12px;margin-top:5px;color:${playerVince?'#5DBB63':playerIn?'#E05555':'#9B7E5E'}">${playerVince?'Morale +100 🎉':playerIn?'Morale −50 😔':'Morale −75 💔'}</div>
  </div>
  <button class="btn gold w" onclick="showFineAnnoScelta(${playerVince?1:0})">Prossimo anno →</button>`;
  setMain(html);
  if(playerVince){
    G.trofei=(G.trofei||0)+1;G.morale=Math.min(200,G.morale+100);
    if(!G.trofeiPerContrada)G.trofeiPerContrada={};

  else{G.morale=Math.max(0,G.morale-75);addLog('Palio '+G.anno+': eliminato in batteria. Morale −75','red');}
  salva();
}

function fineAnno(vinta,cambiaContrada,nuovaContrada){
  if(MosInt){clearInterval(MosInt);MosInt=null;}
  G.mi=0;G.difesa=0;G.fan=null;
  G.raccoltaUsata=false;G.cenaUsata=false;G.sicurezzaUsata=false;G.eventoUsato=false;
  G.puntSfilata=0;G._bP=null;G._bIA=null;G._qP=null;G._qIA=null;G._vinta=null;
  // Budget fine anno — solo se si resta nella stessa contrada
  if(!cambiaContrada){
    if(G.bonus==='VOLANO_POPOLARE'){G.oro+=vinta?3000:Math.floor(G.morale*30*rf(.8,1.2));}
    else{G.oro+=(vinta?3000:2000);}
  }
  // Invecchiamento TUTTI i cavalli
  if(G.stalla){G.stalla.forEach(c=>{c.maxAcc=Math.max(1,c.maxAcc-1);c.maxRes=Math.max(1,c.maxRes-1);c.acc=Math.min(c.acc,c.maxAcc);c.res=Math.min(c.res,c.maxRes);});}
  G.anno++;
  if(cambiaContrada&&nuovaContrada){
    const db=CDB[nuovaContrada];
    G.nome=nuovaContrada;G.nemica=db.nemica;G.bonus=db.bonus;
    G.morale=db.morale;
    G.oro=db.budget;
    G.stalla=[];G.cav=null;G.cavSelIdx=0;
    inizAmicizia();
    addLog('Nuova contrada: '+nuovaContrada+'. Stalla azzerata, budget di partenza.','inf');
  } else {
    G.cav=G.stalla&&G.stalla.length?G.stalla[0]:null;G.cavSelIdx=0;
  }
  MKT=genMkt();salva();
  R('HUD').style.display='grid';R('NAV').style.display='flex';
  R('MAIN').innerHTML='';avviaUI();
}

  const slot=R('FNT_NOME')._slot||1;
  const db=CDB[contrada];
  // Genera fantini rivali: 7 assegnati 1 per contrada (esclusa la propria), gli altri svincolati
  const rivali={};
  const altreContradeInit=Object.keys(CDB).filter(k=>k!==contrada);
  const shuffContrade=[...altreContradeInit].sort(()=>Math.random()-.5);
  const shuffNomi=[...NOMI_FANTINI_RIVALI].sort(()=>Math.random()-.5);
  shuffNomi.forEach((n,i)=>{
    rivali[n]={contrada:i<shuffContrade.length?shuffContrade[i]:null,amicizia:rnd(30,70)};
  });
  // Intesa con capitani di ogni contrada
  const intesaCapitani={};
  Object.keys(CDB).forEach(k=>{intesaCapitani[k]=k===contrada?60:rnd(20,50);});

  F={
    nome,contrada,nemica:db.nemica,slot,
    oro:0,mi:0,anno:2026,
    bravura:1,esperienza:1,mossa:1,empatia:1,
    sostegno:50,intesa:60,
    rivali,intesaCapitani,
    stallaContrada:[],stallaPersonale:[],
    cavScelta:null,
    amiciziaMensile:0,
    addestramentoUsato:false,
    corsaUsata:false,
    allenamentoContrataUsato:false,
    veterinario:false,
    imprevistaUsato:false,
    log:[],
    premi:[],
    mktF:null
  };
  F.mktF=fGenMkt();
  fSalva();
  fAvviaUI();
}

function fGenMkt(){
  return {cavalli:sample(NC,5).map(n=>newCav(n))};
}

function fAddLog(msg,tipo){
  if(!F)return;
  F.log.unshift({msg,tipo,mese:MESI[Math.min(F.mi,4)]||'—'});
  if(F.log.length>100)F.log.pop();
}

function fCalcEmpatia(){
  const s=F.sostegno;
  if(s<20)return 1;if(s<40)return 2;if(s<60)return 3;if(s<80)return 4;return 5;
}

function fPipsGrn(val,max){let h='<div class="fpip-row">';for(let i=0;i<max;i++)h+=`<div class="fpip${i<val?' grn':''}"></div>`;return h+'</div>';}
function fPipsBlu(val,max){let h='<div class="fpip-row">';for(let i=0;i<max;i++)h+=`<div class="fpip${i<val?' blu':''}"></div>`;return h+'</div>';}
function fCavCardHeader(c,isContrada){
  // stanchezza (max 3 verde), intesa col fantino (max 3 azzurro)
  const stan=c.stanchezza||0;const int=c.intesaFant||0;
  return `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
    <div style="font-family:var(--fn);font-size:13px;font-weight:700;color:var(--gold)">${c.nome}</div>
    <div style="display:flex;gap:10px;align-items:center">
      <div>
        <div class="fpip-label" style="text-align:center;margin-bottom:2px">STAN</div>
        ${fPipsGrn(stan,3)}
      </div>
      <div>
        <div class="fpip-label" style="text-align:center;margin-bottom:2px">INT</div>
        ${fPipsBlu(int,3)}
      </div>
    </div>
  </div>`;
}
function fApplicaStanchezzaEffetti(c){
  // stanchezza 2 → -1 res temporanea (salvata come penalità separata)
  // stanchezza 3 → non può correre
  c._penRes= c.stanchezza>=2 ? 1 : 0;
}
function fApplicaIntesaEffetti(c){
  // intesa 2 → +1 ten; intesa 3 → +1 ten, -1 ner
  c._bonTen = c.intesaFant>=2 ? 1 : 0;
  c._bonNer = c.intesaFant>=3 ? 1 : 0;
}
function fStatCorsaEffettiva(c){
  // restituisce stats effettive per la corsa tenendo conto di bonus/penalità temporanei
  fApplicaStanchezzaEffetti(c);fApplicaIntesaEffetti(c);
  return {
    vel:c.vel, acc:c.acc,
    ten:c.ten+(c._bonTen||0),
    res:Math.max(1,c.res-(c._penRes||0)),
    ner:Math.max(1,c.ner-(c._bonNer||0))
  };
}

function fSyncIntesa(){
  // F.intesa e F.intesaCapitani[F.contrada] devono coincidere
  if(!F.intesaCapitani)F.intesaCapitani={};
  F.intesaCapitani[F.contrada]=F.intesa;
}
function fSyncEmpatia(){F.empatia=fCalcEmpatia();fSyncIntesa();}

// ── UI FANTINO ──
function fAvviaUI(){
  R('HUD').style.display='none';
  R('H_ANNO').textContent='Palio di Legnano';
  R('H_NOME').textContent='Fantino '+F.nome;
  R('NAV').style.display='flex';
  fSyncIntesa();
  // Rebuild nav for fantino
  R('NAV').innerHTML=`
    <button class="nb on" onclick="fGoTo('mese')"><span class="nbi">📅</span>Mese</button>
    <button class="nb" onclick="fGoTo('stalla')"><span class="nbi">🐎</span>Stalla</button>
    <button class="nb" onclick="fGoTo('mercato')"><span class="nbi">🛒</span>Mercato</button>
    <button class="nb" onclick="fGoTo('politica')"><span class="nbi">⚔️</span>Politica</button>
    <button class="nb" onclick="fGoTo('contrade')"><span class="nbi">🏰</span>Contrade</button>
    <button class="nb" onclick="fGoTo('premi')"><span class="nbi">🏆</span>Premi</button>`;
  if(!R('sc-fmese')) fBuildDOM();
  fGoTo('mese');
}

function fBuildDOM(){
  R('MAIN').innerHTML=`<div class="pad">
    <div class="sc on" id="sc-fmese"></div>
    <div class="sc" id="sc-fstalla"></div>
    <div class="sc" id="sc-fmercato"></div>
    <div class="sc" id="sc-fpolitica"></div>
    <div class="sc" id="sc-fcontrade"></div>
    <div class="sc" id="sc-fpremi"></div>
  </div>`;
}

function fGoTo(id){
  document.querySelectorAll('.sc').forEach(s=>s.classList.remove('on'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  const ids=['mese','stalla','mercato','politica','contrade','premi'];
  const el=R('sc-f'+id);if(el)el.classList.add('on');
  document.querySelectorAll('.nb')[ids.indexOf(id)].classList.add('on');
  R('MAIN').scrollTop=0;
  if(id==='mese')fRenderMese();
  if(id==='stalla')fRenderStalla();
  if(id==='mercato')fRenderMercato();
  if(id==='politica')fRenderPolitica();
  if(id==='contrade')fRenderContrade();
  if(id==='premi')fRenderPremi();
}

}

// ── SCHERMATA MESE ──

  const el=R('sc-fmese');if(!el)return;

  el.innerHTML=fHudHTML()+`
  <div class="mt" id="FMTRACK"></div>
  <div class="card">
    <div class="ct">Statistiche fantino — ${F.nome}</div>
    ${fStarRow('Bravura',F.bravura)}
    ${fStarRow('Esperienza',F.esperienza)}
    ${fStarRow('Gestione mossa',F.mossa)}
    ${fStarRow('Empatia',F.empatia)}
    ${fBar('Intesa col Capitano',F.intesa,'fnt-bar-green')}

  </div>
  <div class="card">
    <div class="ct">Azioni mensili</div>
    <div style="display:flex;flex-direction:column;gap:8px">

        <div style="font-weight:700;font-size:15px;color:var(--gold-l)">💬 Dialoga col Capitano</div>

      </button>
      <button class="btn ${F.corsaUsata?'':'gold'}" ${F.corsaUsata?'disabled':''} style="text-align:left;padding:14px;display:flex;flex-direction:column;gap:6px" onclick="fCorsaAddestramento()">
        <div style="font-weight:700;font-size:15px;color:${F.corsaUsata?'rgba(201,168,76,.4)':'var(--bg)'}">🏁 Corsa di addestramento</div>
        <div style="font-size:12px;color:${F.corsaUsata?'rgba(201,168,76,.3)':'rgba(0,0,0,.45)'};line-height:1.4">Max 1 al mese<br>Vittoria +1 Bravura</div>
      </button>
    </div>
    <div id="FEVBOX"></div>
    <button class="btn pr w" onclick="fAvanzaMese()" style="margin-top:10px">${isMaggio?'⚔ Vigilia del Palio →':'Passa al mese successivo →'}</button>
  </div>`;
  fRenderMtrack();
}

function fRenderMtrack(){
  const el=R('FMTRACK');if(!el)return;
  el.innerHTML=MESI.map((m,i)=>`<div class="md ${i<F.mi?'done':''} ${i===F.mi?'cur':''}">${m.substr(0,3).toUpperCase()}</div>`).join('');
}

function fShowEv(msg,tipo){
  const el=R('FEVBOX');if(!el)return;
  el.innerHTML=`<div class="evbox ${tipo||'inf'}" style="margin-top:8px">${msg}</div>`;
}

function fAvanzaMese(){
  if(!F)return;
  if(F.mi===4){fShowSceltaCavallo();return;}
  F.mi++;
  F.oro+=(F._stipendioBase||100);
  F.addestramentoContrataUsato=false;
  F.corsaUsata=false;
  F.amiciziaMensile=0;
  F.imprevistaUsato=false;
  F._imprevistoPista=false;
  [...F.stallaContrada,...F.stallaPersonale].forEach(cv=>{cv._infortunato=false;});
  if(!F.mktF||F.mi%1===0)F.mktF=fGenMkt();
  // Veterinario: -1 stanchezza a tutti i cavalli
  if(F.veterinario){
    [...F.stallaContrada,...F.stallaPersonale].forEach(cv=>{cv.stanchezza=Math.max(0,(cv.stanchezza||0)-1);});
    fAddLog('Veterinario: stanchezza −1 a tutti i cavalli','grn');
  }
  // Fine anno: veterinario abbandona
  fSyncEmpatia();
  fAddLog('Mese '+F.mi+'. +'+(F._stipendioBase||100)+' oro stipendio.','inf');
  // Imprevisti (30%, max 1 al mese)
  if(!F.imprevistaUsato&&Math.random()<0.3){fEstraiImprevisto();}
  fSalva();
  fGoTo('mese');
}

function fDialogaCapitano(){
  setMain(`<div class="pad">
    <div style="text-align:center;margin-bottom:12px">
      <div style="font-size:30px">💬</div>
      <div style="font-family:var(--fn);font-size:17px;font-weight:700;color:var(--gold);margin-top:6px">Dialoga col Capitano</div>
      <div style="font-size:12px;color:rgba(201,168,76,.5);margin-top:4px">Contrada ${F.contrada}</div>
    </div>
    <div class="card">
      ${fBar('Intesa col Capitano',F.intesa,'fnt-bar-green')}
      ${fBar('Sostegno contradaioli',F.sostegno,'fnt-bar-blue')}
    </div>
    <div class="card">
      <div class="ct">Azioni</div>
      ${!F.veterinario&&!F._stipendioAumentato?`
      <button class="btn gold w" onclick="fRichiediAumento()" style="margin-bottom:8px">
        💰 Richiedi aumento di stipendio
        <div style="font-size:11px;font-weight:400;margin-top:2px">Intesa −5 · Sostegno −10</div>
      </button>`:'<div style="font-size:12px;color:rgba(201,168,76,.4);margin-bottom:8px">'+(F.veterinario?'Veterinario attivo — aumento non richiedibile':'Aumento già richiesto quest\'anno')+'</div>'}
      ${!F.veterinario?`
      <button class="btn w" onclick="fRichiediVeterinario()">
        🏥 Assumi il Veterinario
        <div style="font-size:11px;font-weight:400;margin-top:2px">Solo se hai già vinto con questa contrada · Dura fino a fine anno · Stanchezza −1/mese tutti i cavalli</div>
      </button>`:'<div class="evbox grn" style="margin-top:4px">✦ Veterinario attivo fino a fine anno</div>'}
    </div>
    <div id="FDIALOG_ESITO"></div>
    <button class="btn w" onclick="fBuildDOM();fGoTo('mese')" style="margin-top:8px">← Torna al mese</button>
  </div>`);
}

function fRichiediAumento(){
  const media=(F.bravura+F.esperienza+F.mossa+F.empatia)/4;
  const nuovoStipendio=Math.floor(media*100);
  F.intesa=clamp(F.intesa-5,0,100);
  F.sostegno=clamp(F.sostegno-10,0,100);
  fSyncEmpatia();
  fAddLog('Richiesto aumento stipendio. Nuovo stipendio mensile: '+nuovoStipendio+' oro','inf');
  F._stipendioBase=nuovoStipendio;
  const el=R('FDIALOG_ESITO');
  if(el) el.innerHTML=`<div class="evbox grn" style="margin-top:10px">
    Il Capitano accetta. Nuovo stipendio mensile: <strong>${nuovoStipendio} oro</strong><br>
    <span style="font-size:11px">Intesa −5 · Sostegno −10</span>
  </div>`;
  fSalva();
}


function fEstraiImprevisto(){
  F.imprevistaUsato=true;
  const tuttoCav=[...F.stallaContrada,...F.stallaPersonale];
  const tipi=['dormito_bene','meteo_pista','infortunato','amici','patto_diavolo'];
  const tipo=tipi[rnd(0,tipi.length-1)];
  let msg='';
  if(tipo==='dormito_bene'&&tuttoCav.length){
    const cv=tuttoCav[rnd(0,tuttoCav.length-1)];
    cv.stanchezza=Math.max(0,(cv.stanchezza||0)-1);
    msg='😴 Il cavallo '+cv.nome+' ha dormito bene! Stanchezza −1';
  } else if(tipo==='meteo_pista'){
    F._imprevistoPista=true;
    msg='🌧️ Pista impraticabile! Nessuna corsa di addestramento questo mese.';
  } else if(tipo==='infortunato'&&tuttoCav.length){
    const cv=tuttoCav[rnd(0,tuttoCav.length-1)];
    cv._infortunato=true;
    msg='🤕 '+cv.nome+' è infortunato! Non può allenarsi né correre questo mese.';
  } else if(tipo==='amici'){
    const nomiRiv=Object.keys(F.rivali);
    const scelto=nomiRiv[rnd(0,nomiRiv.length-1)];
    F.rivali[scelto].amicizia=100;
    msg='🤝 Sei diventato grande amico di '+scelto+'! Amicizia → 100';
  } else if(tipo==='patto_diavolo'){
    const nemCap=Object.keys(F.intesaCapitani).find(k=>k===F.nemica)||Object.keys(F.intesaCapitani)[0];
    F.intesaCapitani[nemCap]=100;
    F.mossa=1;
    msg='😈 Patto col diavolo! Intesa col capitano di '+nemCap+' → 100 ma Gestione Mossa → 1.';
  } else return; // nessun effetto se no cavalli
  showToast(msg.substring(0,50),'red');
  fAddLog('Imprevisto: '+msg,'red');
}

function fRichiediVeterinario(){
  const haVinto=(F.premi||[]).some(p=>p.contrada===F.contrada);
  const el=R('FDIALOG_ESITO');
  if(!haVinto){
    if(el)el.innerHTML=`<div class="evbox red" style="margin-top:10px">Il Capitano rifiuta. Devi aver già vinto il Palio con questa contrada.</div>`;
    return;
  }
  F.veterinario=true;F._stipendioAumentato=true; // blocca aumento
  fAddLog('Veterinario assunto! Stanchezza −1/mese per tutti i cavalli.','grn');
  if(el)el.innerHTML=`<div class="evbox grn" style="margin-top:10px">✦ Veterinario assunto! Ridurrà la stanchezza di −1 ogni mese per tutti i cavalli in stalla.</div>`;
  fSalva();
}

function fRenderStalla(){

    F.stallaContrada.forEach((c,i)=>{

      html+=`<div style="border:var(--bord);border-radius:10px;padding:11px;margin-bottom:8px;background:#1A0E08">
        ${fCavCardHeader(c,true)}
        ${eta}
        ${sRow('Velocità',c.vel)}${sRowCapped('Accelerazione',c.acc,c.maxAcc)}
        ${sRow('Tenuta curva',c.ten)}${sRowCapped('Resistenza',c.res,c.maxRes)}
        ${sRow('Nervosismo',c.ner,5,true)}
        ${!F.addestramentoContrataUsato?`
        <div style="font-size:10px;color:rgba(201,168,76,.5);margin:8px 0 4px;text-transform:uppercase;letter-spacing:1px">Allenamento (gratis · 1/mese)</div>
        <div style="display:flex;flex-direction:column;gap:5px">
          <button class="train-btn" onclick="fAllenaContrada(${i},'forza')"><div class="train-title">Forza pura</div><div class="train-desc">+1 Velocità, +1 Nervosismo</div></button>
          <button class="train-btn" ${c.acc>=c.maxAcc?'disabled':''} onclick="fAllenaContrada(${i},'controllo')"><div class="train-title">Controllo e ritmo</div><div class="train-desc ${c.acc>=c.maxAcc?'cap':''}">${c.acc>=c.maxAcc?'Acc al massimo':'+1 Accelerazione, −1 Nervosismo'}</div></button>
          <button class="train-btn" ${c.res>=c.maxRes?'disabled':''} onclick="fAllenaContrada(${i},'fondo')"><div class="train-title">Fondo e curve</div><div class="train-desc ${c.res>=c.maxRes?'cap':''}">${c.res>=c.maxRes?'Res al massimo':'+1 Tenuta curva, +1 Resistenza'}</div></button>
        </div>`:'<div style="font-size:11px;color:rgba(201,168,76,.4);margin-top:6px">Allenamento contrada già usato questo mese</div>'}
      </div>`;
    });
  } else html+=`<div style="font-size:13px;color:rgba(201,168,76,.4)">Nessun cavallo di contrada. Proponi uno al mercato.</div>`;
  html+=`</div>`;
  // Cavalli personali
  html+=`<div class="card"><div class="ct">I tuoi cavalli personali</div>`;
  if(F.stallaPersonale.length){
    F.stallaPersonale.forEach((c,i)=>{
      const anni=F.anno-(c.annoAcquisto||F.anno);
      const etaP=c.maxAcc<5||c.maxRes<5?`<div style="font-size:11px;color:#E05555;margin-bottom:6px">⚠ ${anni} anni in stalla — invecchiamento attivo.</div>`:'';
      const prezzoVendita=Math.floor((c.valoreAcquisto||c.valore)*.5);
      html+=`<div style="border:var(--bord);border-radius:10px;padding:11px;margin-bottom:8px;background:#1A0E08">
        ${fCavCardHeader(c,false)}
        ${etaP}
        ${sRow('Velocità',c.vel)}${sRowCapped('Accelerazione',c.acc,c.maxAcc)}
        ${sRow('Tenuta curva',c.ten)}${sRowCapped('Resistenza',c.res,c.maxRes)}
        ${sRow('Nervosismo',c.ner,5,true)}
        <div style="font-size:10px;color:rgba(201,168,76,.5);margin:8px 0 4px;text-transform:uppercase;letter-spacing:1px">Allenamento (300 oro)</div>
        <div style="display:flex;flex-direction:column;gap:5px">
          <button class="train-btn" ${F.oro<300?'disabled':''} onclick="fAllenaPersonale(${i},'forza')"><div class="train-title">Forza pura</div><div class="train-desc">+1 Velocità, +1 Nervosismo</div></button>
          <button class="train-btn" ${(F.oro<300||c.acc>=c.maxAcc)?'disabled':''} onclick="fAllenaPersonale(${i},'controllo')"><div class="train-title">Controllo e ritmo</div><div class="train-desc ${c.acc>=c.maxAcc?'cap':''}">${c.acc>=c.maxAcc?'Acc al massimo':'+1 Accelerazione, −1 Nervosismo'}</div></button>
          <button class="train-btn" ${(F.oro<300||c.res>=c.maxRes)?'disabled':''} onclick="fAllenaPersonale(${i},'fondo')"><div class="train-title">Fondo e curve</div><div class="train-desc ${c.res>=c.maxRes?'cap':''}">${c.res>=c.maxRes?'Res al massimo':'+1 Tenuta curva, +1 Resistenza'}</div></button>
        </div>
        <div style="display:flex;justify-content:flex-end;margin-top:8px">
          <button class="btn" style="font-size:11px;padding:6px 12px" onclick="fVendiCavPersonale(${i})">Vendi (${prezzoVendita} oro)</button>
        </div>
      </div>`;
    });
  } else html+=`<div style="font-size:13px;color:rgba(201,168,76,.4)">Nessun cavallo personale. Acquistane uno al mercato.</div>`;
  html+=`</div>`;
  el.innerHTML=html;
}

function fAllenaContrada(idx,tipo){
  if(F.addestramentoContrataUsato){showToast('Allenamento contrada già usato!','red');return;}
  const c=F.stallaContrada[idx];if(!c)return;
  if(tipo==='forza'){c.vel=clamp(c.vel+1,1,5);c.ner=clamp(c.ner+1,1,5);fAddLog('Forza pura su '+c.nome+' (contrada)','inf');}
  else if(tipo==='controllo'){c.acc=clamp(c.acc+1,1,c.maxAcc);c.ner=clamp(c.ner-1,1,5);fAddLog('Controllo su '+c.nome+' (contrada)','inf');}
  else{c.ten=clamp(c.ten+1,1,5);c.res=clamp(c.res+1,1,c.maxRes);fAddLog('Fondo su '+c.nome+' (contrada)','inf');}
  F.addestramentoContrataUsato=true;
  c.stanchezza=Math.min(3,(c.stanchezza||0)+1);
  showToast('✦ Allenamento completato!','grn');
  fSalva();fRenderStalla();
}
function fAllenaPersonale(idx,tipo){
  if(F.oro<300){showToast('Servono 300 oro!','red');return;}
  const c=F.stallaPersonale[idx];if(!c)return;
  F.oro-=300;
  if(tipo==='forza'){c.vel=clamp(c.vel+1,1,5);c.ner=clamp(c.ner+1,1,5);fAddLog('Forza pura su '+c.nome+' −300 oro','inf');}
  else if(tipo==='controllo'){c.acc=clamp(c.acc+1,1,c.maxAcc);c.ner=clamp(c.ner-1,1,5);fAddLog('Controllo su '+c.nome+' −300 oro','inf');}

function fAcquistaCav(i){

// ── CORSA ADDESTRAMENTO ──
function fCorsaAddestramento(){
  if(F.corsaUsata){showToast('Corsa già effettuata questo mese!','red');return;}
  if(F._imprevistoPista){showToast('Pista impraticabile! Nessuna corsa questo mese.','red');return;}
  // 4 contrade casuali
  const tutte=Object.keys(CDB);
  const partecipanti=sample(tutte,4);
  // se la contrada del fantino non c'è, sostituisci uno
  if(!partecipanti.includes(F.contrada)){partecipanti[0]=F.contrada;}
  // sorteggio semplice su cavalli
  const cavDisp=[...F.stallaContrada,...F.stallaPersonale].filter(cv=>!cv._infortunato);
  if(!cavDisp.length){showToast('Serve almeno un cavallo!','red');return;}
  setMain(`<div class="pad">
    <div style="text-align:center;margin-bottom:12px">
      <div style="font-size:28px">🏋️</div>
      <div style="font-family:var(--fn);font-size:17px;font-weight:700;color:var(--gold);margin-top:4px">Corsa di Addestramento</div>
      <div style="font-size:12px;color:rgba(201,168,76,.5)">Partecipanti: ${partecipanti.join(' · ')}</div>
    </div>
    <div class="card">
      <div class="ct">Scegli il cavallo</div>
      ${cavDisp.map((c,i)=>`<button class="btn w" onclick="fRunAddestramento(${i})" style="text-align:left;margin-bottom:6px;padding:10px">
        <span style="font-weight:700">${c.nome}</span>
        <span style="font-size:11px;color:rgba(201,168,76,.5);margin-left:8px">Vel:${c.vel} Acc:${c.acc} Ten:${c.ten}</span>
      </button>`).join('')}
    </div>
    <button class="btn w" onclick="fBuildDOM();fGoTo('mese')" style="margin-top:4px">← Annulla</button>
    <div id="FADDR_DATA" style="display:none" data-part="${JSON.stringify(partecipanti).replace(/"/g,'&quot;')}"></div>
  </div>`);
  F._addestramentoCav=[...cavDisp];
}

function fRunAddestramento(cavIdx){
  const cavList=F._addestramentoCav||[];
  const cavSel=cavList[cavIdx];
  if(cavSel&&(cavSel.stanchezza||0)>=3){showToast('Cavallo troppo stanco per correre!','red');return;}
  const el=R('FADDR_DATA');
  const partecipanti=el?JSON.parse(el.dataset.part.replace(/&quot;/g,'"')):Object.keys(CDB).slice(0,4);
  const cav=F._addestramentoCav[cavIdx];

  // Mostra minigioco mossa per addestramento
  F._addestramentoOnComplete=()=>{
    // simula batteria da 4
    const sc={};
    partecipanti.forEach(n=>{sc[n]=0;});
    const gpg=[];
    for(let g=1;g<=4;g++){
      partecipanti.forEach(n=>{
        const isP=(n===F.contrada);
        const c2=isP?cav:newIACav();const f2=isP?{bravura:F.bravura,esp:F.esperienza,mossa:F.mossa,emp:F.empatia}:newIAFan();
        const fatica=Math.max(0,(g-1)*(6-c2.res)*.2);
        const base=(c2.vel+c2.acc+c2.ten)-fatica+(f2.bravura*.5+(f2.emp||f2.empatia||1)*.2);
        sc[n]+=base*((g===1&&isP)?Mos.mult:1)+rf(0,3);
      });
      gpg.push([...Object.entries(sc)].sort((a,b)=>b[1]-a[1]).map(x=>x[0]));
    }
    const finale=gpg[gpg.length-1];
    const pos=finale.indexOf(F.contrada)+1;
    const vinto=pos===1;
    if(vinto){F.bravura=clamp(F.bravura+1,1,5);fAddLog('Corsa addestramento vinta! +1 Bravura','grn');}
    else{fAddLog('Corsa addestramento: '+pos+'° posto.','inf');}
    // Aggiorna stanchezza e intesa fantino
    const cavScelto=F._addestramentoCav[cavIdx];
    cavScelto.stanchezza=Math.min(3,(cavScelto.stanchezza||0)+1);
    cavScelto.intesaFant=Math.min(3,(cavScelto.intesaFant||0)+1);
    // Cavalli non scelti: -1 stanchezza
    const tuttoCav=[...F.stallaContrada,...F.stallaPersonale];
    tuttoCav.forEach(cv=>{if(cv!==cavScelto)cv.stanchezza=Math.max(0,(cv.stanchezza||0)-1);});
    F.corsaUsata=true;fSalva();
    // Show result
    let html=`<div style="text-align:center;margin-bottom:12px">
      <div style="font-size:28px">${vinto?'🥇':'🏁'}</div>
      <div style="font-family:var(--fn);font-size:16px;font-weight:700;color:${vinto?'var(--gold)':'var(--parch)'};margin-top:6px">${vinto?'Vittoria! +1 Bravura':'Sei arrivato '+pos+'°'}</div>
    </div><div class="card">`;
    for(let g=0;g<gpg.length;g++){
      html+=`<div style="margin-bottom:7px"><div style="font-size:9px;color:var(--gold);text-transform:uppercase;letter-spacing:2px;margin-bottom:3px">Giro ${g+1}</div>`;
      gpg[g].forEach((nome,p)=>{const isP=nome===F.contrada;html+=`<div class="cr-line ${isP?'pp':'def'}">${p+1}° ${nome}</div>`;});
      html+=`</div>`;
    }
    html+=`</div><button class="btn gold w" onclick="fBuildDOM();fGoTo('mese')">Torna al mese →</button>`;
    setMain('<div class="pad">'+html+'</div>');
  };
  fShowMossaFantino('addestramento');
}

// ── MOSSA FANTINO ──
function fShowMossaFantino(fase){
  setMain(`<div class="pad">
    <div style="text-align:center;margin-bottom:12px">
      <div style="font-size:30px">🏁</div>
      <div style="font-family:var(--fn);font-size:17px;font-weight:700;color:var(--gold);margin-top:6px">Il Canapo è Tirato!</div>
      <div style="font-size:12px;color:rgba(201,168,76,.5)">${fase==='finale'?'Finale':'Batteria'} · Ferma il cursore nella zona verde</div>
    </div>
    <div class="card"><div class="ct">Fase di mossa</div>
      <div class="mbar" id="MBAR" onclick="fFermaMossa('${fase}')">
        <div class="mz" id="MZ"></div><div class="mt2" id="MT2"></div><div class="mcu" id="MCU"></div></div>
      <div style="font-size:11px;color:rgba(201,168,76,.5)">Clicca per scattare</div>
    </div>
    <div id="MOS_RIS" style="display:none" class="card">
      <div id="MOS_T" style="font-family:var(--fn);font-size:14px;font-weight:700;color:var(--gold);margin-bottom:6px"></div>
      <div id="MOS_B" style="font-size:11px;color:rgba(201,168,76,.5);margin-bottom:10px"></div>
      <button class="btn gold w" id="MOS_BTN">Continua →</button>
    </div>
  </div>`);
  const vel=Math.max(.5,1+(1*.4)-(F.bravura*.1));
  const amp=Math.max(3,5+(F.mossa*2));
  // Amicizia fantini in batteria rende la zona più ampia
  const avgAmi=Object.values(F.rivali).reduce((s,r)=>s+r.amicizia,0)/Object.keys(F.rivali).length;
  const bonusAmi=avgAmi>=70?3:avgAmi>=50?1:0;
  Mos={tacca:rnd(30,80),amp:Math.max(3,amp+bonusAmi),vel,t:0,pos:50,active:true,mult:1};
  if(MosInt)clearInterval(MosInt);
  MosInt=setInterval(()=>{
    if(!Mos.active)return;Mos.t+=.04;Mos.pos=clamp((Math.sin(Mos.t*Mos.vel*2)+1)*50,0,100);
    const bar=R('MBAR');if(!bar){clearInterval(MosInt);return;}
    const w=bar.offsetWidth;
    const ce=R('MCU'),te=R('MT2'),ze=R('MZ');
    if(ce)ce.style.left=(Mos.pos/100*w-3)+'px';
    if(te)te.style.left=(Mos.tacca/100*w-1)+'px';
    if(ze){const a=Mos.amp/100*w;ze.style.left=(Mos.tacca/100*w-a/2)+'px';ze.style.width=a+'px';}
  },40);
}

function fFermaMossa(fase){
  if(!Mos.active)return;Mos.active=false;clearInterval(MosInt);MosInt=null;
  const d=Math.abs(Mos.pos-Mos.tacca);let esito,mult,msg;
  if(d<=Mos.amp/2){esito='OTTIMALE';mult=1.15;msg='⚡ PARTENZA A FIONDA!';F.mossa=clamp(F.mossa+1,1,5);}
  else if(Mos.pos>Mos.tacca+Mos.amp/2){esito='FALSA';mult=.1;msg='✗ PARTENZA FALSA!';F.mossa=clamp(F.mossa-1,1,5);}
  else{esito='LENTA';mult=.5;msg='⚠ PARTENZA LENTA';F.mossa=clamp(F.mossa-1,1,5);}
  Mos.mult=mult;
  R('MOS_RIS').style.display='block';
  const t=R('MOS_T');t.textContent=msg;
  t.style.color=esito==='OTTIMALE'?'#5DBB63':esito==='FALSA'?'#E05555':'var(--gold)';
  R('MOS_B').textContent=`Dist: ${Math.round(d)} · ×${mult} · Gestione mossa: ${F.mossa}/5`;
  fAddLog('Mossa ('+fase+'): '+esito,'inf');
  const btn=R('MOS_BTN');
  if(btn){
    if(fase==='addestramento'&&F._addestramentoOnComplete){
      btn.onclick=F._addestramentoOnComplete;
    } else if(fase==='batteria'){
      btn.onclick=()=>fShowSceltaStrategia('batteria');
    } else {
      btn.onclick=()=>fShowSceltaStrategia('finale');
    }
  }
  fSalva();
}

      <div style="font-size:30px">⚖️</div>

        <div style="font-size:11px;color:rgba(201,168,76,.5);line-height:1.6">+1 Velocità cavallo<br>−5 amicizia rivali<br>−10 intesa capitani avv.<br>+10 intesa tuo capitano<br>+15 sostegno contradaioli</div>
      </div>
