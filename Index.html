<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Palio">
<meta name="theme-color" content="#1A0E08">
<title>Palio di Legnano</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
:root{
  --gold:#C9A84C;--gold-l:#E8D5A3;--gold-d:#8B6914;
  --parch:#F5EDD6;--parch2:#E8D5A3;
  --bg:#1A0E08;--bg2:#261508;
  --red:#8B1A1A;--red2:#5C0000;
  --bord:1px solid rgba(201,168,76,0.27);
  --bord2:1px solid rgba(201,168,76,0.53);
  --st:env(safe-area-inset-top,0px);
  --sb:env(safe-area-inset-bottom,0px);
  --sl:env(safe-area-inset-left,0px);
  --sr:env(safe-area-inset-right,0px);
  /* iOS system fonts — no external deps */
  --fs:ui-serif,-apple-system-ui-serif,"Georgia",serif;
  --fd:"Georgia","Times New Roman",serif;
  --fn:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",sans-serif;
}
html,body{height:100%;overflow:hidden;background:#0D0806;overscroll-behavior:none}
body{font-family:var(--fs)}

.app{position:fixed;top:0;left:0;right:0;bottom:0;
  padding-top:var(--st);padding-bottom:var(--sb);
  padding-left:var(--sl);padding-right:var(--sr);
  background:var(--bg);color:var(--parch);
  display:flex;flex-direction:column;overflow:hidden}
.app::before{content:"";position:absolute;inset:0;pointer-events:none;z-index:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 30px,rgba(201,168,76,.04) 30px,rgba(201,168,76,.04) 31px),
             repeating-linear-gradient(90deg,transparent,transparent 30px,rgba(201,168,76,.04) 30px,rgba(201,168,76,.04) 31px)}

/* HEADER */
.hdr{background:linear-gradient(135deg,#3D0000,#8B1A1A 50%,#3D0000);
  border-bottom:2px solid var(--gold);
  padding:12px 16px;display:flex;align-items:center;justify-content:space-between;
  position:relative;z-index:10;flex-shrink:0}
.hdr::after{content:"✦";position:absolute;left:50%;transform:translateX(-50%);
  color:var(--gold);font-size:13px;opacity:.6}
.hsub{font-size:10px;color:var(--gold-l);letter-spacing:2px;text-transform:uppercase;
  font-family:var(--fn)}
.htit{font-family:var(--fn);font-size:17px;font-weight:700;color:var(--gold);letter-spacing:.5px}
.hmese{font-family:var(--fn);font-size:11px;color:var(--gold-l);text-align:right}

/* HUD */
.hud{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;
  padding:7px 10px;background:var(--bg2);
  border-bottom:var(--bord);position:relative;z-index:9;flex-shrink:0}
.hc{background:var(--bg2);border:var(--bord);border-radius:7px;padding:5px 7px;overflow:hidden;position:relative}
.hc::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.hl{font-size:9px;color:var(--gold-l);letter-spacing:1px;text-transform:uppercase;
  font-family:var(--fn);margin-bottom:1px}
.hv{font-size:12px;font-weight:700;color:var(--parch);white-space:nowrap;overflow:hidden;
  text-overflow:ellipsis;font-family:var(--fn)}
.hv.o{color:var(--gold)}.hv.v{color:#5DBB63}

/* MAIN */
.main{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;
  position:relative;z-index:1}
.main::-webkit-scrollbar{display:none}
.pad{padding:12px 12px 24px}

/* BOTTOM NAV */
.nav{display:flex;border-top:var(--bord);background:var(--bg2);
  position:relative;z-index:10;flex-shrink:0}
.nb{flex:1;padding:8px 2px calc(8px + 2px);font-size:9px;color:rgba(201,168,76,.5);
  background:none;border:none;border-top:2px solid transparent;
  cursor:pointer;font-family:var(--fn);letter-spacing:.2px;
  display:flex;flex-direction:column;align-items:center;gap:3px;min-height:52px}
.nb.on{color:var(--gold);border-top-color:var(--gold)}
.nbi{font-size:19px;line-height:1}

/* CARD */
.card{background:linear-gradient(135deg,#261508,#2C1810);border:var(--bord);
  border-radius:12px;padding:14px;margin-bottom:10px;position:relative;overflow:hidden}
.card::before{content:"";position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(201,168,76,.27),var(--gold),rgba(201,168,76,.27),transparent)}
.ct{font-family:var(--fn);font-size:9px;font-weight:600;color:var(--gold);
  text-transform:uppercase;letter-spacing:2px;margin-bottom:10px;
  display:flex;align-items:center;gap:8px}
.ct::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,rgba(201,168,76,.27),transparent)}

/* BUTTONS */
.btn{padding:13px 16px;border-radius:10px;border:var(--bord2);
  background:linear-gradient(135deg,#3D1F0A,#2C1810);
  cursor:pointer;font-size:15px;font-family:var(--fn);
  color:var(--gold-l);font-weight:600;
  min-height:48px;display:inline-flex;align-items:center;justify-content:center;
  -webkit-appearance:none;transition:opacity .1s}
.btn:active{opacity:.75}
.btn.pr{background:linear-gradient(135deg,var(--red),var(--red2));color:var(--gold);border-color:var(--gold)}
.btn.gold{background:linear-gradient(135deg,var(--gold-d),#6B4F10);color:var(--bg);border-color:var(--gold);font-weight:700}
.btn.w{width:100%;margin-top:8px;display:flex}
.btn[disabled]{opacity:.35;pointer-events:none}

/* ACTION GRID */
.ag{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ab{padding:13px 11px;background:linear-gradient(135deg,#261508,#1A0E08);
  border:var(--bord);border-radius:12px;cursor:pointer;text-align:left;
  min-height:84px;display:flex;flex-direction:column;justify-content:space-between;
  -webkit-appearance:none}
.ab:active{opacity:.7}
.ab[disabled]{opacity:.35;pointer-events:none}
.ic{font-size:22px;margin-bottom:4px}
.at{font-size:13px;font-weight:700;color:var(--gold-l);font-family:var(--fn)}
.ac{font-size:11px;color:rgba(201,168,76,.6);margin-top:2px;font-family:var(--fn);line-height:1.3}
.ab.red .at{color:#E05555}

/* STAT ROWS */
.sr{display:flex;align-items:center;gap:6px;margin:5px 0}
.sl{font-size:12px;color:rgba(201,168,76,.6);width:128px;flex-shrink:0;font-family:var(--fn)}
.ds{display:flex;gap:4px}
.dot{width:14px;height:14px;border-radius:50%;background:#3D1F0A;border:1px solid #5C3D2E}
.dot.on{background:var(--gold);border-color:var(--gold)}
.dot.fire{background:#E05555;border-color:#E05555}
.sn{font-size:12px;color:rgba(201,168,76,.6);margin-left:3px}

/* MARKET ITEMS */
.mi{display:flex;gap:10px;padding:12px;background:#1A0E08;
  border:var(--bord);border-radius:12px;margin-bottom:8px}
.mi-name{font-size:13px;font-weight:700;color:var(--gold-l);
  font-family:var(--fn);margin-bottom:4px}
.mi-cost{font-size:12px;color:var(--gold);font-weight:700}

/* LOG */
.le{font-size:13px;color:rgba(201,168,76,.5);padding:6px 0;
  border-bottom:1px solid rgba(201,168,76,.1);line-height:1.5;font-family:var(--fn)}
.le:last-child{border-bottom:none}
.le.red{color:#E05555}.le.grn{color:#5DBB63}.le.inf{color:var(--gold-l)}

/* BADGES */
.bdg{display:inline-block;padding:2px 8px;border-radius:5px;font-size:10px;font-weight:700;font-family:var(--fn)}
.bdg.r{background:rgba(139,26,26,.27);color:#E05555;border:1px solid rgba(224,85,85,.27)}
.bdg.g{background:rgba(26,74,26,.27);color:#5DBB63;border:1px solid rgba(93,187,99,.27)}
.bdg.o{background:rgba(107,73,16,.27);color:var(--gold);border:1px solid rgba(201,168,76,.27)}

/* MONTH TRACK */
.mt{display:flex;gap:4px;margin-bottom:12px}
.md{flex:1;padding:7px 2px;text-align:center;font-size:9px;border-radius:7px;
  background:#1A0E08;color:#5C3D2E;border:var(--bord);font-family:var(--fn);font-weight:600}
.md.done{background:var(--gold-d);color:var(--gold);border-color:var(--gold)}
.md.cur{background:linear-gradient(135deg,var(--red),var(--red2));color:var(--gold);
  border-color:var(--gold);font-weight:800}

/* BARS */
.pb{height:6px;background:#261508;border-radius:3px;overflow:hidden;margin-top:4px}
.pf{height:100%;border-radius:3px;transition:width .4s}
.pfm{background:linear-gradient(90deg,#2E7D32,#5DBB63)}
.pfd{background:linear-gradient(90deg,#185FA5,#378ADD)}

/* MOSSA BAR */
.mbar{position:relative;height:64px;background:#1A0E08;border-radius:12px;
  overflow:hidden;cursor:pointer;margin:12px 0;border:var(--bord2)}
.mz{position:absolute;top:0;height:100%;background:rgba(26,74,26,.53)}
.mt2{position:absolute;top:0;width:4px;height:100%;background:#5DBB63}
.mcu{position:absolute;top:10px;width:8px;height:44px;background:var(--red);border-radius:4px}

/* INTRO */
.intro-bg{text-align:center;padding:24px 12px}
.cg2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.cc2{padding:13px;background:#1A0E08;border:var(--bord);border-radius:12px;
  cursor:pointer;text-align:left}
.cc2:active{opacity:.7}
.cc2.sel{border:2px solid var(--gold);background:#261508}
.cc2-name{font-size:14px;font-weight:700;color:var(--gold);font-family:var(--fn)}
.cc2-desc{font-size:11px;color:rgba(201,168,76,.6);margin-top:3px;
  font-family:var(--fn);line-height:1.4}

/* RACE */
.cr-line{padding:7px 10px;border-radius:7px;margin:2px 0;font-size:13px;
  display:flex;align-items:center;gap:6px;font-family:var(--fn)}
.cr-line.p1{background:rgba(107,73,16,.13);color:var(--gold);font-weight:700}
.cr-line.pp{background:rgba(24,95,165,.13);color:#7BC8FF;font-weight:700}
.cr-line.def{background:rgba(26,14,8,.53);color:rgba(201,168,76,.5)}
.batt-box{background:#1A0E08;border-radius:8px;padding:10px 13px;margin-bottom:8px;border:var(--bord)}
.batt-nome{font-size:13px;color:var(--parch);padding:5px 0;
  border-bottom:1px solid rgba(201,168,76,.1);font-family:var(--fn)}
.batt-nome:last-child{border-bottom:none}
.batt-nome.tu{color:var(--gold);font-weight:700}

/* EVBOX */
.evbox{font-size:13px;padding:11px 13px;border-radius:10px;margin:8px 0;
  font-family:var(--fn);border-left:3px solid;line-height:1.5}
.evbox.red{background:rgba(139,26,26,.13);color:#E05555;border-color:#E05555}
.evbox.grn{background:rgba(26,74,26,.13);color:#5DBB63;border-color:#5DBB63}
.evbox.inf{background:rgba(24,95,165,.13);color:#7BC8FF;border-color:#378ADD}

/* DECO LINE */
.deco{display:flex;align-items:center;gap:8px;margin:12px 0;
  color:rgba(201,168,76,.27);font-size:12px;font-family:var(--fn)}
.deco::before,.deco::after{content:"";flex:1;height:1px;
  background:linear-gradient(90deg,transparent,rgba(201,168,76,.27))}

/* BIG SCORE */
.score-big{font-family:var(--fn);font-size:56px;font-weight:800;color:var(--gold);
  text-align:center;padding:10px 0;letter-spacing:-1px}
.result-banner{padding:16px;text-align:center;border-radius:12px;
  background:linear-gradient(135deg,rgba(139,26,26,.2),rgba(61,0,0,.4));
  border:var(--bord2);margin-bottom:12px}

/* TRAIN BUTTONS */
.train-btn{width:100%;text-align:left;padding:14px 13px;border-radius:10px;
  border:var(--bord);background:linear-gradient(135deg,#261508,#1A0E08);
  cursor:pointer;font-family:var(--fn);margin-bottom:7px;min-height:60px;
  display:block;-webkit-appearance:none}
.train-btn:active{opacity:.7}
.train-btn[disabled]{opacity:.4;pointer-events:none}
.train-title{font-weight:700;font-size:14px;color:var(--gold-l)}
.train-desc{font-size:12px;color:rgba(201,168,76,.6);margin-top:3px}
.train-desc.cap{color:#E05555}

/* RANGE */
input[type=range]{accent-color:var(--gold);height:32px;width:100%}

.sc{display:none}.sc.on{display:block}

/* iOS install hint */
.install-hint{font-size:11px;color:#5C3D2E;margin-top:20px;line-height:1.6;
  padding:10px;border-radius:8px;border:var(--bord);background:rgba(201,168,76,.04)}
</style>
</head>
<body>
<div class="app" id="APP">
<div class="hdr">
  <div><div class="hsub" id="H_ANNO">Palio di Legnano</div><div class="htit" id="H_NOME">Scegli la Contrada</div></div>
  <div class="hmese" id="H_MESE"></div>
</div>
<div class="hud" id="HUD" style="display:none">
  <div class="hc"><div class="hl">Oro</div><div class="hv o" id="HO">—</div></div>
  <div class="hc"><div class="hl">Morale</div><div class="hv v" id="HM">—</div></div>
  <div class="hc"><div class="hl">Cavallo</div><div class="hv" id="HC">—</div></div>
  <div class="hc"><div class="hl">Fantino</div><div class="hv" id="HF">—</div></div>
</div>
<div class="main" id="MAIN">
<div class="pad">
<div class="sc on" id="sc-mese">
  <div class="mt" id="MTRACK"></div>
  <div class="card">
    <div class="ct">Azioni mensili</div>
    <div class="ag" id="MAZIONI"></div>
    <div id="EVBOX"></div>
    <button class="btn pr w" id="BTN_AV" onclick="avanzaMese()">Passa al mese successivo →</button>
  </div>
  <div class="card">
    <div class="ct">Stato della contrada</div>
    <div style="font-family:var(--fn);font-size:9px;color:rgba(201,168,76,.6);letter-spacing:1px;margin-bottom:3px">MORALE</div>
    <div class="pb"><div class="pf pfm" id="BM"></div></div>
    <div style="font-family:var(--fn);font-size:9px;color:rgba(201,168,76,.6);letter-spacing:1px;margin-top:8px;margin-bottom:3px">DIFESA STALLA</div>
    <div class="pb"><div class="pf pfd" id="BD"></div></div>
  </div>
</div>
<div class="sc" id="sc-stalla">
  <div class="card" id="CARD_CAV"></div>
  <div class="card" id="CARD_FAN"></div>
</div>
<div class="sc" id="sc-mercato">
  <div class="card"><div class="ct">Fantini disponibili</div><div id="MKT_F"></div></div>
  <div class="card"><div class="ct">Cavalli disponibili</div><div id="MKT_C"></div></div>
</div>
<div class="sc" id="sc-politica">
  <div class="card"><div class="ct">Scegli il bersaglio</div><div id="POL_B"></div></div>
  <div class="card">
    <div class="ct">Tipo di azione</div>
    <div class="ag">
      <button class="ab red" onclick="setPT('SCHERZO')"><div class="ic">🎨</div><div class="at">Scherzo</div><div class="ac">-15 morale avversario</div></button>
      <button class="ab red" onclick="setPT('IMBOSCATA')"><div class="ic">🌶️</div><div class="at">Imboscata</div><div class="ac">+nervosismo cavallo</div></button>
    </div>
    <div id="POL_MSG" style="font-size:13px;color:rgba(201,168,76,.6);margin-top:8px;font-family:var(--fn)"></div>
    <button class="btn pr w" onclick="eseguiPol()">Esegui azione politica</button>
  </div>
</div>
<div class="sc" id="sc-contrade">
  <div class="card"><div class="ct">Tutte le contrade</div><div id="ALLCT"></div></div>
</div>
<div class="sc" id="sc-log">
  <div class="card"><div class="ct">Diario del Capitano</div><div id="LOGL"></div></div>
</div>
</div>
</div>
<div class="nav" id="NAV" style="display:none">
  <button class="nb on" onclick="goTo('mese')"><span class="nbi">📅</span>Mese</button>
  <button class="nb" onclick="goTo('stalla')"><span class="nbi">🐎</span>Stalla</button>
  <button class="nb" onclick="goTo('mercato')"><span class="nbi">🛒</span>Mercato</button>
  <button class="nb" onclick="goTo('politica')"><span class="nbi">⚔️</span>Politica</button>
  <button class="nb" onclick="goTo('contrade')"><span class="nbi">🏰</span>Contrade</button>
  <button class="nb" onclick="goTo('log')"><span class="nbi">📜</span>Diario</button>
</div>
</div>
<script>
const CDB={
  Flora:        {nemica:"SanMartino",   bonus:"ALTA_FINANZA",      desc:"Inizia con 5000 oro",            budget:5000,morale:60},
  Legnarello:   {nemica:"SantAmbrogio", bonus:"VOLANO_POPOLARE",   desc:"Budget legato al morale",        budget:3500,morale:60},
  SanBernardino:{nemica:"SanMagno",     bonus:"DIPLOMAZIA_ASTUTA", desc:"−30% rischio intrighi politici", budget:3500,morale:60},
  SanDomenico:  {nemica:"SantErasmo",   bonus:"SCUDERIA_ELITE",    desc:"Allenamento cavallo a 250 oro",  budget:3500,morale:60},
  SanMagno:     {nemica:"SanBernardino",bonus:"PRESTIGIO_STORICO", desc:"Fantini −20% di costo",          budget:3500,morale:60},
  SanMartino:   {nemica:"Flora",        bonus:"FAME_DI_VITTORIA",  desc:"Morale di partenza 85/200",      budget:3500,morale:85},
  SantAmbrogio: {nemica:"Legnarello",   bonus:"RACCOLTA_FONDI",    desc:"Raccolta fondi 300 oro",         budget:3500,morale:60},
  SantErasmo:   {nemica:"SanDomenico",  bonus:"ALLEVAMENTO_TOP",   desc:"Cavalli −20% di costo",          budget:3500,morale:60}
};
const NF=["Aceto","Il Pesse","Massimino","Tittia","Scompiglio","Gingillo","Tremante","Brigante","Bighino","Cittino","Richi Dimo"];
const NC=["Fulmine","Tempesta","Vento","Spirit","Dardo","Ombra","Abbagliante","Guerriero","Woody","Pannocchia","Star","Odi et Amo"];
const MESI=["Gennaio","Febbraio","Marzo","Aprile","Maggio"];
let G=null,MKT=null,PB=null,PT="SCHERZO",MosInt=null,Mos={};
const rnd=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
const rf=(a,b)=>Math.random()*(b-a)+a;
const sample=(arr,n)=>[...arr].sort(()=>Math.random()-.5).slice(0,n);
const clamp=(v,mn,mx)=>Math.max(mn,Math.min(mx,v));
const R=id=>document.getElementById(id);
function dotsH(v,max=5,fire=false){let h='<div class="ds">';for(let i=0;i<max;i++)h+=`<div class="dot${i<Math.round(v)?(fire?' fire':' on'):''}"></div>`;return h+'</div>';}
function sRow(l,v,max=5,fire=false){return `<div class="sr"><span class="sl">${l}</span>${dotsH(v,max,fire)}<span class="sn">${(+v).toFixed(1)}</span></div>`;}
function newFan(nome){const b=rnd(1,5),e=rnd(1,5),m=rnd(1,5),em=rnd(1,5);let c=Math.floor(((b+e+m+em)/4)*450*(0.9+Math.random()*.3));if(G&&G.bonus==="PRESTIGIO_STORICO")c=Math.floor(c*.8);return {nome,bravura:b,esp:e,mossa:m,emp:em,costo:c};}
function newCav(nome,elite=false){const v=elite?5:rnd(1,5),a=elite?5:rnd(1,5),t=elite?5:rnd(1,5),r=elite?5:rnd(1,5),n=elite?1:rnd(1,3);let val=Math.floor(((v+a+t+r)/4)*450);if(G&&G.bonus==="ALLEVAMENTO_TOP")val=Math.floor(val*.8);return {nome,vel:v,acc:a,ten:t,res:r,ner:n,valore:val,maxAcc:5,maxRes:5};}
function newIACav(){return {vel:rnd(2,5),acc:rnd(2,5),ten:rnd(2,5),res:rnd(2,5),ner:rnd(1,3)};}
function newIAFan(){return {bravura:rnd(2,5),esp:rnd(2,5),mossa:rnd(2,5),emp:rnd(2,5)};}
function genMkt(){const f=sample(NF,5).map(n=>newFan(n));const c=sample(NC,5).map(n=>newCav(n));if(G&&G.bonus==="ALLEVAMENTO_TOP")c.unshift(newCav("Campione Reale",true));return {f,c};}
function addLog(msg,tipo=''){if(!G)return;G.log.unshift({msg,tipo,mese:MESI[Math.min(G.mi,4)]||'—'});if(G.log.length>100)G.log.pop();}
function showEv(msg,tipo){const el=R('EVBOX');if(!el)return;el.innerHTML=`<div class="evbox ${tipo||'inf'}">${msg}</div>`;}
function updHUD(){if(!G)return;R('HO').textContent=G.oro+' oro';R('HM').textContent=G.morale+'/200';R('HC').textContent=G.cav?G.cav.nome:'—';R('HF').textContent=G.fan?G.fan.nome:'—';R('H_NOME').textContent=G.nome;R('H_ANNO').textContent='Anno '+G.anno;R('H_MESE').textContent=MESI[Math.min(G.mi,4)];const bm=R('BM'),bd=R('BD');if(bm)bm.style.width=(G.morale/200*100)+'%';if(bd)bd.style.width=(G.difesa/5*100)+'%';}
function goTo(id){document.querySelectorAll('.sc').forEach(s=>s.classList.remove('on'));document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));R('sc-'+id).classList.add('on');const ids=['mese','stalla','mercato','politica','contrade','log'];document.querySelectorAll('.nb')[ids.indexOf(id)].classList.add('on');if(id==='stalla')renderStalla();if(id==='mercato')renderMkt();if(id==='politica')renderPol();if(id==='contrade')renderAllCt();if(id==='log')renderLog();if(id==='mese'){renderMtrack();renderMazioni();}}
function renderMtrack(){const el=R('MTRACK');if(!el||!G)return;el.innerHTML=MESI.map((m,i)=>`<div class="md ${i<G.mi?'done':''} ${i===G.mi?'cur':''}">${m.substr(0,3).toUpperCase()}</div>`).join('');}
function renderMazioni(){const el=R('MAZIONI');if(!el||!G)return;const costoAll=G.bonus==='SCUDERIA_ELITE'?250:500;const noRF=G.raccoltaUsata,noCena=G.cenaUsata,noSic=G.sicurezzaUsata,noAll=!G.cav||G.oro<costoAll;el.innerHTML=`<button class="ab" ${noRF?'disabled':''} onclick="${noRF?'':'doAz(\'raccolta\')'}"><div class="ic">⛪</div><div class="at">Raccolta fondi</div><div class="ac">${noRF?'Già usata':'+ '+(G.bonus==="RACCOLTA_FONDI"?'300':'200')+' oro, +5 morale'}</div></button><button class="ab" ${noCena?'disabled':''} onclick="${noCena?'':'doAz(\'cena\')'}"><div class="ic">🍷</div><div class="at">Cena in maniero</div><div class="ac">${noCena?'Già usata':'− 100 oro, +15 morale'}</div></button><button class="ab" ${noSic?'disabled':''} onclick="${noSic?'':'doAz(\'sicurezza\')'}"><div class="ic">🛡️</div><div class="at">Rinforza stalla</div><div class="ac">${noSic?'Già usata':'− 300 oro, +2 difesa'}</div></button><button class="ab" ${noAll?'disabled':''} onclick="${noAll?'':'goTo(\'stalla\')'}"><div class="ic">🏋️</div><div class="at">Allenamento cavallo</div><div class="ac">${!G.cav?'Serve un cavallo':G.oro<(G.bonus==="SCUDERIA_ELITE"?250:500)?'Servono '+(G.bonus==="SCUDERIA_ELITE"?'250':'500')+' oro':'− '+(G.bonus==="SCUDERIA_ELITE"?'250':'500')+' oro'}</div></button>`;const btn=R('BTN_AV');if(btn)btn.textContent=G.mi===4?'⚔ Vigilia del Palio →':'Passa al mese successivo →';}
function doAz(tipo){if(!G)return;if(tipo==='raccolta'){if(G.raccoltaUsata)return;const g=G.bonus==='RACCOLTA_FONDI'?300:200;G.oro+=g;G.morale=clamp(G.morale+5,0,200);G.raccoltaUsata=true;addLog('Raccolta fondi +'+g+' oro','inf');showEv('✦ Raccolta fondi! +'+g+' oro, +5 morale','grn');}else if(tipo==='cena'){if(G.cenaUsata)return;if(G.oro<100){showEv('Oro insufficiente (100 necessari).','red');return;}const bn=G.bonus==='RACCOLTA_FONDI'?30:0;G.oro-=(100-bn);G.morale=clamp(G.morale+15,0,200);G.cenaUsata=true;addLog('Cena in maniero. +15 morale','inf');showEv('✦ Cena in maniero! +15 morale','grn');}else if(tipo==='sicurezza'){if(G.sicurezzaUsata)return;if(G.oro<300){showEv('Oro insufficiente (300 necessari).','red');return;}G.oro-=300;G.difesa=clamp(G.difesa+2,0,5);G.sicurezzaUsata=true;addLog('Stalla rinforzata. Difesa +2','inf');showEv('✦ Stalla rinforzata! Difesa '+G.difesa+'/5','grn');}updHUD();renderMazioni();salva();}
function avanzaMese(){if(!G)return;if(G.mi===4){showVigilia();return;}if(G.difesa>0)G.difesa--;G.oro+=100;G.raccoltaUsata=false;G.cenaUsata=false;G.sicurezzaUsata=false;const attaccato=Math.random()<.3&&G.difesa<3;let msg='Mese tranquillo. +100 oro.',tipo='inf';if(attaccato){if(Math.random()<.5){G.morale=clamp(G.morale-15,0,200);msg='Attacco nemico! −15 morale';tipo='red';}else if(G.cav){G.cav.ner=clamp(G.cav.ner+1,1,5);msg='Scherzo nemico! +1 nervosismo al cavallo';tipo='red';}}else if(!G.eventoUsato){const r=Math.random();if(r<.15){G.oro+=800;msg='Un ex contradaiolo invia 800 oro!';tipo='grn';G.eventoUsato=true;}else if(r<.28&&G.fan){G.fan.bravura=clamp(G.fan.bravura-1,1,5);msg='Il fantino ha l\'influenza! −1 bravura';tipo='red';G.eventoUsato=true;}else if(r<.38){G.oro=Math.max(0,G.oro-600);msg='Multa per cena proibita! −600 oro';tipo='red';G.eventoUsato=true;}}addLog(msg,tipo);showEv(msg,tipo);G.mi++;MKT=genMkt();updHUD();renderMtrack();renderMazioni();salva();}
function sRowCapped(l,v,capMax,fire=false){
  let h=`<div class="sr"><span class="sl">${l}</span><div class="ds">`;
  for(let i=0;i<5;i++){
    if(i<capMax) h+=`<div class="dot${i<Math.round(v)?(fire?' fire':' on'):''}"></div>`;
    else h+=`<div class="dot" style="opacity:.18;border-style:dashed"></div>`;
  }
  h+=`</div><span class="sn">${(+v).toFixed(1)}/<span style="color:${capMax<5?'#E05555':'inherit'}">${capMax}</span></span></div>`;
  return h;
}
function renderStalla(){if(!G)return;const cv=R('CARD_CAV'),cf=R('CARD_FAN');if(G.cav){const c=G.cav;
  const accAtMax=c.acc>=c.maxAcc, resAtMax=c.res>=c.maxRes;
  const etaNote=c.maxAcc<5||c.maxRes<5?`<div style="font-size:11px;color:#E05555;margin-bottom:8px;font-family:'Crimson Pro',serif">⚠ Il cavallo ha ${5-Math.min(c.maxAcc,c.maxRes)} anno/i alle spalle — accelerazione e resistenza non possono superare il loro massimo attuale.</div>`:'';
  cv.innerHTML=`<div class="ct">Il tuo destriero</div>
  <div style="font-family:'Cinzel',serif;font-size:13px;color:var(--gold);margin-bottom:8px">${c.nome}</div>
  ${etaNote}
  ${sRow('Velocità',c.vel)}
  ${sRowCapped('Accelerazione',c.acc,c.maxAcc)}
  ${sRow('Tenuta curva',c.ten)}
  ${sRowCapped('Resistenza',c.res,c.maxRes)}
  ${sRow('Nervosismo',c.ner,5,true)}
  <div class="deco">allenamento</div>
  <div style="display:flex;flex-direction:column;gap:5px">
    <button class="btn" style="text-align:left;padding:9px" onclick="allena('forza')">
      <span style="font-weight:600;font-family:'Cinzel',serif;font-size:11px">Forza pura</span>
      <span style="font-size:11px;color:#9B7E5E;margin-left:8px">+1 Velocità, +1 Nervosismo</span></button>
    <button class="btn${accAtMax?' ':' '}" style="text-align:left;padding:9px" ${accAtMax?'disabled':''} onclick="allena('controllo')">
      <span style="font-weight:600;font-family:'Cinzel',serif;font-size:11px">Controllo e ritmo</span>
      <span style="font-size:11px;color:${accAtMax?'#E05555':'#9B7E5E'};margin-left:8px">${accAtMax?'Accelerazione al massimo ('+c.maxAcc+')':'+1 Accelerazione, −1 Nervosismo'}</span></button>
    <button class="btn" style="text-align:left;padding:9px" ${resAtMax?'disabled':''} onclick="allena('fondo')">
      <span style="font-weight:600;font-family:'Cinzel',serif;font-size:11px">Fondo e curve</span>
      <span style="font-size:11px;color:${resAtMax?'#E05555':'#9B7E5E'};margin-left:8px">${resAtMax?'Resistenza al massimo ('+c.maxRes+')':'+1 Tenuta curva, +1 Resistenza'}</span></button>
  </div>
  <div id="AMSG" style="font-size:11px;color:#5DBB63;margin-top:6px;font-family:'Crimson Pro',serif"></div>
  <button class="btn w" onclick="vendiCav()" style="margin-top:10px">Vendi cavallo (${Math.floor(c.valore*.5)} oro)</button>`;}
else{cv.innerHTML='<div class="ct">Il tuo destriero</div><div style="font-size:13px;color:#9B7E5E">Nessun cavallo in stalla. Vai al mercato.</div>';}
if(G.fan){const f=G.fan;cf.innerHTML=`<div class="ct">Il tuo fantino</div><div style="font-family:'Cinzel',serif;font-size:13px;color:var(--gold);margin-bottom:8px">${f.nome}</div>${sRow('Bravura',f.bravura)}${sRow('Esperienza',f.esp)}${sRow('Gestione mossa',f.mossa)}${sRow('Empatia',f.emp)}<button class="btn w" onclick="licFan()">Licenzia fantino</button>`;}
else{cf.innerHTML='<div class="ct">Il tuo fantino</div><div style="font-size:13px;color:#9B7E5E">Nessun fantino. Vai al mercato.</div>';}}
function allena(tipo){if(!G.cav)return;const costoAll=G.bonus==='SCUDERIA_ELITE'?250:500;if(G.oro<costoAll){if(R('AMSG'))R('AMSG').textContent='Oro insufficiente!';return;}const c=G.cav;G.oro-=costoAll;if(tipo==='forza'){c.vel=clamp(c.vel+1,1,5);c.ner=clamp(c.ner+1,1,5);addLog('Allenamento Forza: +1 Vel, +1 Ner','inf');}else if(tipo==='controllo'){c.acc=clamp(c.acc+1,1,c.maxAcc);c.ner=clamp(c.ner-1,1,5);addLog('Allenamento Controllo: +1 Acc (max '+c.maxAcc+'), −1 Ner','inf');}else if(tipo==='fondo'){c.ten=clamp(c.ten+1,1,5);c.res=clamp(c.res+1,1,c.maxRes);addLog('Allenamento Fondo: +1 Ten, +1 Res (max '+c.maxRes+')','inf');}if(R('AMSG'))R('AMSG').textContent='✦ Allenamento completato!';updHUD();renderStalla();salva();}
function vendiCav(){if(!G.cav)return;const v=Math.floor(G.cav.valore*.5);G.oro+=v;addLog('Venduto '+G.cav.nome,'inf');G.cav=null;updHUD();renderStalla();salva();}
function licFan(){if(!G.fan)return;addLog(G.fan.nome+' licenziato','inf');G.fan=null;updHUD();renderStalla();salva();}
function mktItem(item,isF,i){const stats=isF?sRow('Bravura',item.bravura)+sRow('Esperienza',item.esp)+sRow('Gestione mossa',item.mossa)+sRow('Empatia',item.emp):sRow('Velocità',item.vel)+sRow('Accelerazione',item.acc)+sRow('Tenuta curva',item.ten)+sRow('Resistenza',item.res)+sRow('Nervosismo',item.ner,5,true);const costo=isF?item.costo:item.valore;return `<div class="mi"><div style="flex:1"><div class="mi-name">${item.nome} <span class="mi-cost">${costo} oro</span></div>${stats}</div><div><button class="btn pr" style="font-size:10px;padding:5px 9px;margin-top:4px" onclick="${isF?'buyF':'buyC'}(${i})">${isF?'Ingaggia':'Acquista'}</button></div></div>`;}
function renderMkt(){if(!MKT)MKT=genMkt();R('MKT_F').innerHTML=MKT.f.map((f,i)=>mktItem(f,true,i)).join('');R('MKT_C').innerHTML=MKT.c.map((c,i)=>mktItem(c,false,i)).join('');}
function buyF(i){const f=MKT.f[i];if(G.oro<f.costo){alert('Oro insufficiente!');return;}G.oro-=f.costo;G.fan=f;MKT.f.splice(i,1);addLog('Ingaggiato '+f.nome+' per '+f.costo+' oro','inf');updHUD();renderMkt();salva();}
function buyC(i){const c=MKT.c[i];if(G.oro<c.valore){alert('Oro insufficiente!');return;}G.oro-=c.valore;G.cav=c;MKT.c.splice(i,1);addLog('Acquistato '+c.nome+' per '+c.valore+' oro','inf');updHUD();renderMkt();salva();}
function renderPol(){R('POL_B').innerHTML=Object.keys(CDB).filter(k=>k!==G.nome).map(k=>{const isN=k===CDB[G.nome].nemica;return `<div class="mi" style="cursor:pointer" onclick="selPB('${k}')" id="PB_${k}"><div><div style="font-size:12px;font-weight:600;color:var(--gold-light);font-family:'Cinzel',serif">${k} ${isN?'<span class="bdg r">nemica</span>':''}</div><div style="font-size:11px;color:#9B7E5E">${CDB[k].desc}</div></div></div>`;}).join('');R('POL_MSG').textContent=PB?'Bersaglio: '+PB+' — Azione: '+PT:'Seleziona un bersaglio';}
function selPB(k){PB=k;document.querySelectorAll('[id^="PB_"]').forEach(e=>e.style.borderColor='');R('PB_'+k).style.borderColor='var(--gold)';R('POL_MSG').textContent='Bersaglio: '+k+' — Azione: '+PT;}
function setPT(t){PT=t;R('POL_MSG').textContent=(PB?'Bersaglio: '+PB:'Seleziona bersaglio')+' — Azione: '+t;}
function eseguiPol(){if(!PB){alert('Seleziona un bersaglio!');return;}const mod=G.bonus==='DIPLOMAZIA_ASTUTA'?.70:1;const scoperto=Math.random()<.3*mod;const isN=PB===CDB[G.nome].nemica;if(scoperto){G.oro=Math.max(0,G.oro-1000);G.morale=clamp(G.morale-10,0,200);addLog('SCOPERTO su '+PB+'! −1000 oro','red');}else{if(PT==='SCHERZO'){G.morale=clamp(G.morale+10,0,200);addLog('Scherzo su '+PB+' riuscito!','inf');}else{addLog('Imboscata su '+PB+(isN?' (nemica)':'')+' riuscita!','inf');}}PB=null;updHUD();renderPol();salva();}
function renderAllCt(){R('ALLCT').innerHTML=Object.entries(CDB).map(([k,v])=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #C9A84C22"><div><div style="font-size:12px;font-weight:${k===G.nome?'600':'400'};color:${k===G.nome?'var(--gold)':'var(--parchment)'};font-family:'Cinzel',serif">${k} ${k===G.nome?'<span class="bdg o">TU</span>':''}</div><div style="font-size:11px;color:#9B7E5E">${v.desc}</div></div><div>${k===CDB[G.nome].nemica?'<span class="bdg r">nemica</span>':''}</div></div>`).join('');}
function renderLog(){const el=R('LOGL');if(!G||!G.log.length){el.innerHTML='<div class="le">Nessun evento ancora.</div>';return;}el.innerHTML=G.log.map(e=>`<div class="le ${e.tipo||''}">[${e.mese}] ${e.msg}</div>`).join('');}
function setMain(html){if(MosInt){clearInterval(MosInt);MosInt=null;}R('MAIN').innerHTML='<div class="pad">'+html+'</div>';}
function showVigilia(){if(!G.cav||!G.fan){alert('Per il Palio servono un cavallo E un fantino!');return;}R('NAV').style.display='none';setMain(`<div style="text-align:center;margin-bottom:14px"><div style="font-size:36px">🌙</div><div style="font-family:'Cinzel',serif;font-size:17px;color:var(--gold);margin-top:6px;letter-spacing:1px">La Vigilia del Palio</div><div style="font-size:12px;color:#9B7E5E;margin-top:4px">Maggio — La città è in fermento</div></div><div class="card"><div class="ct">Cena propiziatoria</div><div style="font-size:13px;color:var(--parchment-dark);margin-bottom:12px;line-height:1.7">La grande cena della vigilia galvanizza i contradaioli e raccoglie offerte. Organizzarla dà <strong style="color:var(--gold)">+15 morale</strong> e un incasso dalla generosità dei contradaioli. Non organizzarla porta un calo del morale.</div><div style="display:flex;gap:16px;font-size:13px;margin-bottom:14px"><div>Morale: <span style="color:var(--gold);font-family:'Cinzel',serif">${G.morale}/200</span></div><div>Oro: <span style="color:var(--gold);font-family:'Cinzel',serif">${G.oro}</span></div></div>${G.oro>=1000?`<button class="btn gold w" onclick="faiCena()" style="margin-bottom:8px">⚜ Organizza la cena (1000 oro)</button>`:`<div style="font-size:12px;color:#E05555;padding:8px;background:#8B1A1A22;border-radius:6px;margin-bottom:8px;border:1px solid #E0555533">Oro insufficiente per la cena (servono 1000 oro).</div>`}<button class="btn w" onclick="saltaCena()">Salta la cena (−15 morale) →</button></div>`);}
function faiCena(){G.oro-=1000;const fatt=rf(.8,1.2);const guad=Math.floor(15*G.morale*fatt);G.morale=clamp(G.morale+15,0,200);G.oro+=guad;if(G.morale>120&&G.fan)G.fan.emp=clamp(G.fan.emp+1,1,5);addLog('Cena propiziatoria! Raccolta '+guad+' oro, morale +15','grn');updHUD();salva();setMain(`<div style="text-align:center;margin-bottom:14px"><div style="font-size:36px">🍷</div><div style="font-family:'Cinzel',serif;font-size:17px;color:var(--gold);margin-top:6px;letter-spacing:1px">La Cena è Stata un Successo!</div></div><div class="card" style="text-align:center"><div class="ct">Incasso della serata</div><div class="score-big">${guad}</div><div style="font-size:13px;color:#9B7E5E;margin-bottom:10px">oro raccolti dai contradaioli</div><div style="font-size:13px;color:var(--parchment-dark)">Morale: <span style="color:#5DBB63;font-family:'Cinzel',serif">${G.morale}/200</span> <span style="color:#5DBB63">(+15)</span></div>${G.fan&&G.morale>120?`<div style="font-size:12px;color:#5DBB63;margin-top:6px">✦ Il tuo fantino è galvanizzato! +1 Empatia</div>`:''}</div><button class="btn gold w" onclick="showSfilata()">Vai alla sfilata →</button>`);}
function saltaCena(){G.morale=clamp(G.morale-15,0,200);addLog('Cena non organizzata. −15 morale','red');updHUD();salva();showSfilata();}
function showSfilata(){setMain(`<div style="text-align:center;margin-bottom:14px"><div style="font-size:36px">🎺</div><div style="font-family:'Cinzel',serif;font-size:17px;color:var(--gold);margin-top:6px;letter-spacing:1px">La Sfilata Storica</div><div style="font-size:12px;color:#9B7E5E;margin-top:4px">Morale: ${G.morale}/200 · Oro: ${G.oro}</div></div><div class="card"><div class="ct">Investimento nella sfilata</div><div style="font-size:13px;color:var(--parchment-dark);margin-bottom:12px;line-height:1.7">Decidi quanto investire per rendere la tua sfilata indimenticabile. Morale e investimento determinano il punteggio, insieme a un tocco di fortuna.</div><div style="display:flex;align-items:center;gap:10px;margin:10px 0"><input type="range" min="0" max="${Math.min(G.oro,2000)}" step="50" value="0" id="SFL_SL" oninput="updSfl()" style="flex:1;accent-color:var(--gold)"><span style="font-family:'Cinzel',serif;font-size:14px;color:var(--gold);min-width:60px;text-align:right" id="SFL_V">0 oro</span></div><div style="font-size:12px;color:#9B7E5E" id="SFL_PR">Punteggio stimato (senza fortuna): ${Math.round(G.morale/200*40)}/80</div><button class="btn gold w" onclick="eseguiSfilata()" style="margin-top:12px">⚜ Sfila! →</button></div>`);}
function updSfl(){const v=parseInt(R('SFL_SL').value);R('SFL_V').textContent=v+' oro';const est=Math.round((G.morale/200*40)+Math.min(v/1000*40,40));R('SFL_PR').textContent='Punteggio stimato (senza fortuna): '+est+'/80  (+0–20 dalla fortuna)';}
function eseguiSfilata(){const inv=parseInt(R('SFL_SL').value);if(inv>G.oro){alert('Oro insufficiente!');return;}G.oro-=inv;G.puntSfilata=Math.round((G.morale/200*40)+Math.min(inv/1000*40,40)+rf(0,20));addLog('Sfilata completata. Punteggio: '+G.puntSfilata+'/100','inf');updHUD();salva();setMain(`<div style="text-align:center;margin-bottom:14px"><div style="font-size:36px">🎺</div><div style="font-family:'Cinzel',serif;font-size:17px;color:var(--gold);margin-top:6px;letter-spacing:1px">Sfilata Completata!</div></div><div class="card" style="text-align:center"><div class="ct">Punteggio sfilata</div><div class="score-big">${G.puntSfilata}<span style="font-size:20px;color:var(--gold-light)">/100</span></div><div style="font-size:13px;color:#9B7E5E">${G.puntSfilata>=70?'Sfilata magnifica! La folla è in delirio.':G.puntSfilata>=50?'Buona sfilata, i contradaioli sono soddisfatti.':G.puntSfilata>=30?'Sfilata discreta. Si può fare meglio.':'Sfilata modesta. I contradaioli sono delusi.'}</div></div><button class="btn gold w" onclick="showSorteggioBatterie()">Vedi il sorteggio delle batterie →</button>`);}
function showSorteggioBatterie(){const tutte=Object.keys(CDB);const shuffled=[...tutte].sort(()=>Math.random()-.5);let bP,bIA;if(shuffled.slice(0,4).includes(G.nome)){bP=shuffled.slice(0,4);bIA=shuffled.slice(4);}else{bIA=shuffled.slice(0,4);bP=shuffled.slice(4);}G._bP=bP;G._bIA=bIA;salva();setMain(`<div style="text-align:center;margin-bottom:14px"><div style="font-size:36px">🎲</div><div style="font-family:'Cinzel',serif;font-size:17px;color:var(--gold);margin-top:6px;letter-spacing:1px">Sorteggio delle Batterie</div><div style="font-size:12px;color:#9B7E5E;margin-top:4px">Le 8 contrade sono state divise in due batterie da 4</div></div><div class="card"><div class="ct">Batteria A — la tua batteria</div><div class="batt-box">${bP.map(n=>`<div class="batt-nome ${n===G.nome?'tu':''}">${n===G.nome?'▶ '+n+' (tu)':n}</div>`).join('')}</div><div style="font-size:11px;color:#9B7E5E">Le prime 2 si qualificano per la finale.</div></div><div class="card"><div class="ct">Batteria B</div><div class="batt-box">${bIA.map(n=>`<div class="batt-nome">${n}</div>`).join('')}</div><div style="font-size:11px;color:#9B7E5E">Le prime 2 si qualificano per la finale.</div></div><button class="btn gold w" onclick="showMossa('batteria')">⚔ Il canapo è tirato! Fase di mossa →</button>`);}

function sRowCapped(l,v,capMax,fire=false){
  let h=`<div class="sr"><span class="sl">${l}</span><div class="ds">`;
  for(let i=0;i<5;i++){
    if(i<capMax) h+=`<div class="dot${i<Math.round(v)?(fire?' fire':' on'):''}"></div>`;
    else h+=`<div class="dot" style="opacity:.18;border-style:dashed"></div>`;
  }
  h+=`</div><span class="sn">${(+v).toFixed(1)}/<span style="color:${capMax<5?'#E05555':'inherit'}">${capMax}</span></span></div>`;
  return h;
}

    cf.innerHTML=`<div class="ct">Il tuo fantino</div>
      <div style="font-family:var(--fn);font-size:16px;font-weight:700;color:var(--gold);margin-bottom:10px">${f.nome}</div>
      ${sRow('Bravura',f.bravura)}${sRow('Esperienza',f.esp)}
      ${sRow('Gestione mossa',f.mossa)}${sRow('Empatia',f.emp)}
      <button class="btn w" onclick="licFan()">Licenzia fantino</button>`;
  } else {
    cf.innerHTML='<div class="ct">Il tuo fantino</div><div style="font-size:14px;color:rgba(201,168,76,.5)">Nessun fantino. Vai al mercato.</div>';
  }
}

function mktItem(item,isF,i){
  const stats=isF
    ?sRow('Bravura',item.bravura)+sRow('Esperienza',item.esp)+sRow('Gestione mossa',item.mossa)+sRow('Empatia',item.emp)
    :sRow('Velocità',item.vel)+sRow('Accelerazione',item.acc)+sRow('Tenuta curva',item.ten)+sRow('Resistenza',item.res)+sRow('Nervosismo',item.ner,5,true);
  const costo=isF?item.costo:item.valore;
  return `<div class="mi"><div style="flex:1"><div class="mi-name">${item.nome} <span class="mi-cost">${costo} oro</span></div>${stats}</div>
    <div style="padding-top:4px"><button class="btn pr" style="font-size:13px;padding:11px 13px" onclick="${isF?'buyF':'buyC'}(${i})">${isF?'Ingaggia':'Acquista'}</button></div></div>`;
}

function goTo(id){
  document.querySelectorAll('.sc').forEach(s=>s.classList.remove('on'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  R('sc-'+id).classList.add('on');
  R('MAIN').scrollTop=0;
  const ids=['mese','stalla','mercato','politica','contrade','log'];
  document.querySelectorAll('.nb')[ids.indexOf(id)].classList.add('on');
  if(id==='stalla')renderStalla();
  if(id==='mercato')renderMkt();
  if(id==='politica')renderPol();
  if(id==='contrade')renderAllCt();
  if(id==='log')renderLog();
  if(id==='mese'){renderMtrack();renderMazioni();}
}

function renderIntro(){
  R('MAIN').innerHTML=`<div class="pad"><div class="intro-bg">
    <div style="font-size:60px;margin-bottom:10px">🏇</div>
    <div style="font-family:var(--fn);font-size:24px;font-weight:800;color:var(--gold);letter-spacing:1px;margin-bottom:6px">PALIO DI LEGNANO</div>
    <div style="font-family:var(--fn);font-size:13px;color:rgba(201,168,76,.5);margin-bottom:22px;letter-spacing:.5px;font-style:italic">Scegli la tua Contrada</div>

    <button class="btn w" onclick="caricaGioco()" style="justify-content:center">Carica partita salvata</button>

      📱 <strong>Installa come app:</strong><br>
      Apri in <strong>Safari</strong> → tocca ⬆ Condividi<br>
      → <strong>"Aggiungi a schermata Home"</strong>

  </div></div>`;
  R('CG').innerHTML=Object.entries(CDB).map(([k,v])=>

      <div class="cc2-name">${k}</div>
      <div class="cc2-desc">${v.desc}</div></div>`).join('');
}

function avviaUI(){

  if(!R('sc-mese')){
    R('MAIN').innerHTML=`<div class="pad">
      <div class="sc on" id="sc-mese">
        <div class="mt" id="MTRACK"></div>
        <div class="card"><div class="ct">Azioni mensili</div><div class="ag" id="MAZIONI"></div><div id="EVBOX"></div>
          <button class="btn pr w" id="BTN_AV" onclick="avanzaMese()">Passa al mese successivo →</button></div>
        <div class="card"><div class="ct">Stato della contrada</div>
          <div style="font-family:var(--fn);font-size:9px;color:rgba(201,168,76,.6);letter-spacing:1px;margin-bottom:3px">MORALE</div>
          <div class="pb"><div class="pf pfm" id="BM"></div></div>
          <div style="font-family:var(--fn);font-size:9px;color:rgba(201,168,76,.6);letter-spacing:1px;margin-top:8px;margin-bottom:3px">DIFESA STALLA</div>
          <div class="pb"><div class="pf pfd" id="BD"></div></div></div>
      </div>
      <div class="sc" id="sc-stalla"><div class="card" id="CARD_CAV"></div><div class="card" id="CARD_FAN"></div></div>

        <div class="card"><div class="ct">Cavalli disponibili</div><div id="MKT_C"></div></div>
      </div>
      <div class="sc" id="sc-politica">

          <div class="ag">
            <button class="ab red" onclick="setPT('SCHERZO')"><div class="ic">🎨</div><div class="at">Scherzo</div><div class="ac">-15 morale avversario</div></button>
            <button class="ab red" onclick="setPT('IMBOSCATA')"><div class="ic">🌶️</div><div class="at">Imboscata</div><div class="ac">+nervosismo cavallo</div></button>
          </div>
          <div id="POL_MSG" style="font-size:13px;color:rgba(201,168,76,.6);margin-top:8px"></div>

    </div>`;
  }
  document.querySelectorAll('.sc').forEach(s=>s.classList.remove('on'));

  document.querySelectorAll('.nb')[0].classList.add('on');
  updHUD();renderMtrack();renderMazioni();
}

// fineAnno ricostruisce anche il DOM mobile
const _origFineAnno = fineAnno;
function fineAnno(vinta){
  if(MosInt){clearInterval(MosInt);MosInt=null;}
  G.mi=0;G.difesa=0;G.fan=null;
  G.raccoltaUsata=false;G.cenaUsata=false;G.sicurezzaUsata=false;G.eventoUsato=false;
  G.puntSfilata=0;G._bP=null;G._bIA=null;G._qP=null;G._qIA=null;
  if(G.bonus==='VOLANO_POPOLARE'){G.oro+=vinta?5000:Math.floor(G.morale*30*rf(.8,1.2));}
  else{G.oro+=(vinta?5000:2000);}
  if(G.cav){G.cav.maxAcc=Math.max(1,G.cav.maxAcc-1);G.cav.maxRes=Math.max(1,G.cav.maxRes-1);
    G.cav.acc=Math.min(G.cav.acc,G.cav.maxAcc);G.cav.res=Math.min(G.cav.res,G.cav.maxRes);}
  G.anno++;MKT=genMkt();salva();
  R('HUD').style.display='grid';R('NAV').style.display='flex';
  R('MAIN').innerHTML='';
  avviaUI();
}

renderIntro();
